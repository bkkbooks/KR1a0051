body:
  text: 易通卷一宋趙以夫撰乾下乾上乾元亨利貞初九潛龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎九五飛龍在天利見大人上九亢龍有悔用九見群龍無首吉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧乾為天天猶形也乾猶神也神所以使其形者也凡物囿於有形必有無形者運於其間坤之於地義亦如此雷風水火山澤莫不皆然釋彖贊乾曰大哉乾之大也不惟萬物資乾以始天為群物之祖所以運而無積者乾之所以為也故曰乃統天乾天道也主爻在五元亨者五用而柔於卦為大有三四五互兊澤之氣上於天行而為雲施而為雨品物賦形生意流動離為日日為大明行乎天上終而復始乾之變體也利貞者五守正不用六畫皆竒初為子二為寅三為辰四為午五為申上為戌六陽之氣周流六位四時以成龍陽物也六陽六龍也時而乘之以御乎天中有主宰旋轉不窮乾之本體也變則雲雨大明之象可得而見不變則雲雨大明之象隱乎其中何者乾數九坤數六六藏於九天包地外也內卦三位耦居竒中外卦三位竒居耦中乾具坎離也天降時雨山川出雲風霆流形庶物露生日之行也有晝有夜景長而夏景短而冬一寒二暑往來不息以日言之則晝夜成以嵗言之則寒暑成子寅辰午申戌為陽未己卯丑亥酉為隂言陽不言隂乾兼乎坤也天之大也誰其統之天之行也誰其御之此言天之助用皆本乎乾也乾不可得而名自其一隂一陽變化者而求之強名之曰道是道流行充塞宇宙人得之以為人物得之以為物所賦者為命所受者為性隂陽沖和之氣各全其所有一成而不易變化則為亨保合則為貞此言人物之賦受皆本乎乾也人為萬物之靈聖人者出類拔萃民物之宗主也首出庶物萬國咸寧蓋言聖人與天為一順天德而出寧日月照而四時行雲行而雨施維天之命於穆不已文王之德之純純亦不已其是之謂歟元亨者大亨也利貞者利於正也凡卦辭元亨利貞並言者皆主爻兼正變二義也亨為變貞為不變象曰天行健君子以自強不息健於平聲為乾乾之義健也象不言乾而言健者乾不可名也天行一日一周周而復始健之至也卦本三竒重三為六變動存焉是之謂行君子法之自強即天行也不息即健也潛龍勿用陽在下也一陽始生其位則子在乎水中龍之象初陽在下不可以用用則為姤小人道也見龍在田德施普也二用而柔變乾為離五之陽為龍二由下而觀五故曰見龍居地之位故曰在田上應大德之君故曰利見大人同人于野指此爻也德施普者君子同乎人也終日乾乾反復道也三用而柔變乾為兊於卦為履兊西方夕也互離日也復還其剛則無互體上下皆乾故曰君子終日乾乾夕惕若也反復道者不失其本然之剛也為履則危知其危而不變焉何咎之有惕者悔之義也訟惕小畜惕出夬惕號義同或躍在淵進無咎也四以剛居隂位雖不當猶是純乾或用而柔於卦為小畜二三四互兊為澤有躍而在淵之象與五合志是為有孚則其進也何咎之有飛龍在天大人造也五以剛居陽君道之正用之而柔變乾為離於卦為大有陽為龍變則飛矣五天位故曰飛龍在天柔得尊位大中指此爻也君位離明天下利見造作也乾以五為主彖具亨貞二義爻但言亨亢龍有悔盈不可久也以剛居上下無其應所以為亢用之而柔於卦為夬悔變也陽為盈盈不可久能無變乎用九天德不可為首也九用而八老陽變為少隂蓋諸卦百九十二陽爻之通例也九為剛用則為柔高明柔克天之德也陽為首變則不為首矣乾六爻皆剛不可為首變之乃吉體剛而用柔也蔡墨以見群龍無首為乾之坤得其義矣坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東比喪朋乃終有慶安貞之吉應地無疆天其運乎乾之所為也地其處乎坤之所為也乾坤其天地之主宰邪積氣成天其大無方積形成地其大有至釋彖贊坤曰至哉坤之大所以異乎乾也萬物負隂抱陽資乾以始資坤以生乾以健行坤以順應故曰乃順承天載華嶽振河海若人若物周遍宇宙無不持載坤之博厚也博厚高明同乎悠久所以與乾合德而無疆也坤地道也主爻在二元亨者二用而剛於卦為師下體變坤為坎坎為月月受日光隂能承陽含𢎞光大也天氣下降陽生地中二三四互震震者萬物之所自出生意萌達而條暢品物咸亨也坤之變體也利貞者二守正不用牝馬之貞猶言女貞以物喻之則為牝牡以人言之則為男女也乾為馬坤為牝馬馬取其行靜中有動也靜雖有動而失主於柔順以順為正坤之本體也君子有攸往者指六三變也先迷者上下皆坤西南坤方以隂比隂於義未光故迷而失道失陽之應也後得主者三用而剛下體為艮東北艮方以隂從陽有為之倡故順而得常得陽之主也西南雖失道而得隂之朋以類相從乃與偕行東北雖喪朋而得陽之配勞謙有終乃能獲慶故皆以利言也二言牝馬之貞守柔為正也三言安貞守剛為正也以剛居陽得當為安以艮應坤得配為吉德合無疆者地之合乎天也行地無疆者坤之行乎地也應地無疆者君子之應乎地也釋彖三言無疆天地人之道備矣象曰地勢坤君子以厚德載物坤取地勢猶乾言天行地勢愈積愈厚本乎自然順之至也卦本三耦重三為六上下具焉是之謂勢君子法坤之厚以厚其德積愈厚而載愈重猶地之無不持載也初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也初為足隂在下履霜之象霜始凝結以漸而積必至堅氷理之常也聖人於乾之初言勿用者恐其為姤也於坤之初言堅氷至者憂其不能為復也魏志初六履霜隂始凝也又郭京徐氏本皆無堅氷二字六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也二以柔居隂臣道之正釋彖所謂柔順利貞此也至靜而德方坤之本體用之而剛則為直直以方者直自方出由方而直也靜而動動而生陽陽為大故曰直方大習重也不習者不為重坤也地道光者陽明之發見如此於卦為師臣之用剛在師為吉無不利者剛中而應二五皆利也彖言亨貞二義爻但言亨六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也剛柔相文為章三守正不用含章也可者非終於不用有時而發也通變之謂事或用而剛以從王事於卦為謙謙尊而光知光大也無成不必守剛但言坤也有終不還其柔但為謙也為坤則與類行為謙則終有慶彖之義也主爻在二彖辭又取三何哉蓋二用為師行師乃吉三用為謙止而能順無震主之威有服民之德坤艮皆土當位有應也此爻亦兼亨貞二義六四括囊無咎無譽象曰括囊無咎慎不害也四用而剛於卦為豫上迫乎五疑忌易生則有咎矣一陽為衆隂所宗則有譽矣括囊者戒其勿用也隂為虛囊既括則其中虛守柔敬謹不至於害何咎之有然時當純隂四不為剛而為柔位雖當而志未行何譽之有六五黃裳元吉象曰黃裳元吉文在中也五用而剛於卦為比坤為裳黃者文也五者中也以剛文柔故曰黃裳上下應之是以元吉上六龍戰于野其血玄黃象曰龍戰于野其道窮也上用而剛於卦為剝隂極陽來勢所必爭陽為龍地上為野龍戰于野之象隂為血坤位西南為黑土居中央為黃隂為陽所傷其血玄黃之象坤道既窮不容不變也用六利永貞象曰用六永貞以大終也用六而七老隂變為少陽蓋諸卦百九十二隂爻之通例也六為柔用則為剛沉潛剛克地之德也隂為小陽為永為大坤六爻皆柔守剛為貞乃其所利以大終者體柔而用剛也二用之利繫於乾坤之後者以全卦之體言之也若推之諸爻或吉或不吉或利或不利則有貞悔諸例隨爻取義各不同也震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧屯自艮來以初為主下艮以三之剛易初之柔而為震上艮以上之剛易五之柔而為坎初三相易為剛柔始交止變險為難生動乎險中未能出險也大亨貞者夫子以變正二義釋元亨利貞也於此而大亨則於卦為比屯之變體也於此而貞但守其剛不可用之而有所往屯之本體也言雖亨而為比不若但守其為屯也震剛居初雷動於先坎剛居五雨動於後雷先於雨所以為屯鬱結未解是為滿盈天造草昧者世道方屯泯泯棼棼莫適攸主當此之時有德在下者宜建之以為侯不皇寧處庶可康屯濟難亦猶雲雷紛紜終必沛然而下則萬物昭蘇矣草始創也昧未明也震為侯國語貞屯悔豫皆利建侯皆指震之陽爻為侯也象曰雲雷屯君子以經綸雷動而雲合欲雨未雨其象為屯草昧之時君子圖維萬事將以濟屯綸者合衆絲而為之猶緯也經緯織綜乃成布帛猶雲雷交錯乃致雨澤也初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也磐石也桓柱也一剛在下磐之象震為木桓之象當屯之時初之君子雖不為柔以比乎五然剛自二來為主於下其志得行所宜守正利居貞也陽貴隂賤以陽下隂上互坤為衆大得乎民利建侯也大陽也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也屯如邅如者屯結邅回有所牽制也乘馬班如者四隂不動如乘馬之分列不行也初以剛居下為卦之主衆隂若可從之二近乎初顧乃不易所守者以與五為正應也正應為婚媾初雖得民二視之則寇也若不為初所迫則與五親矣守柔為正女子貞也始雖不字終配乎五為十年乃字十年天道小變初剛若變於卦為比二五既孚乃復其常無乘剛之難矣為比則下卦坤坤數十字育也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也初陽動於下為禽震為決躁鹿之象也初居下而得民五居君位三不從五則從初然初與三非應猶即鹿而無虞人惟入於林中不知所之也震為木互艮為山山中有木林之象君子見幾不如舍之用之而剛於卦為既濟則當位有應矣宜往而吝安得不窮六四乘馬班如求婚媾往吉無不利象曰求而往明也當屯之時四居近君之位比乎五而不從乎初故亦乘馬班如然與初相應為婚媾終不能止初之求四之志在乎君初求而不得亦往而為柔以孚乎五然後四之心始明於卦為比安得不吉無不利者四與初皆利也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也坎為水膏也雲雷方屯膏澤不下施未光也卦本艮下卦變震上艮未變猶是頥體剛居艮上衆柔由之而得養上施光也六五守柔為正順以從上是為小貞之吉易而為屯九五雖守剛為正而陷乎險中初乃得民於下是為大貞之凶此爻當位有應而以凶言者蓋當屯之時非可以常時論聖人憂患斯世之心於此可見上六乘馬班如泣血漣如象曰泣血漣如何可長也上比乎五而逺於初故亦乘馬班如上之志雖在乎君而初剛在下屯難未平故泣血漣如然五以剛居尊初當變而為柔當此之時上之柔可以比乎五之剛何泣血之有故象以何可長也斷之四馬為乘卦之四隂爻皆馬也六三取其變故不言馬凡卦陰爻有馬之象坤牝馬屯乘馬賁白馬是也左傳班馬注以為分者分列不行之義也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙自震來以二為主下震以初之剛易二之柔而為坎上震以四之剛易上之柔而為艮艮為止坎為險坎水自艮山而出險而猶止其泉未達蒙之時也蒙亨以亨行者初剛既變行而居二於時為中也二為我五為童蒙以下求上當然之理也然當蒙之時柔當求剛無剛而求柔之理今五蒙而二剛非二求於五乃五之志求於二而二應之也故曰童蒙求我匪我求童蒙筮法先得內卦為初筮再得外卦為原筮初筮變震為坎以剛居二且在兩柔之中剛可以告柔故曰初筮告再筮若又變震為坎則五復為剛上下相敵志既不應何可以告是為三瀆故上卦不為坎而為艮二五交孚則不瀆矣利貞者二為主爻守正不變也能養其正艮止於上也剛中者人心固有之天養於其蒙則溥博淵泉而時出之至聖之功基於是矣凡亨字繫於卦名之下皆指來卦言也凡言三多於應爻取義象曰山下出泉蒙君子以果行育德山下之泉自巖穴而出止而未行蒙之象也果行猶泉之始達育德猶山之畜泉初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也初柔居坎險之下蒙也耦為趾互震之木加於趾上桎梏也初用而剛發蒙也決去其柔刑人也初耦既變行而有應雖有桎梏亦無所施説桎梏也守剛得當是謂正法以往者柔往則利乃不知往所謂吝也九二包蒙吉納婦吉子克家象曰子克家剛柔接也二以剛中為蒙之主陽能包隂包蒙也五柔二剛以剛接柔納婦也二者皆吉互震為長子克家之象也恆之六五亦以五為婦二為夫也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也三以柔居陽位既不當下復乘剛女而若是何以取為金夫指二也舍正應而從邪配不有其躬也何利之有蒙本震下震變坎以剛居二六三乘之乃有見金夫之象上震變艮六三應之乃有取女之象行不順者言上不當用而為剛也故戒以勿用六四困蒙吝象曰困蒙之吝獨逺實也以柔居隂雖為得位然當蒙之時無陽剛以發之則困矣吝不知變也陽為實六四一爻乘承比應皆隂故曰獨逺實也六五童蒙吉象曰童蒙之吉順以巽也艮為少男五以柔居中童蒙也用之而剛於卦為渙王居無咎變艮為巽四以柔順乎五五以剛巽乎四君臣相孚各當其位則為童蒙之吉矣上九擊蒙不利為冦利禦冦象曰利用禦冦上下順也蒙以二之剛為主上復以剛分其權是為冦也用之而柔於卦為師擊去其蒙是禦寇也不用則不利用之則利上下順者變艮為坤上下五隂皆順從乎二也蒙有二義天機未發寂然不動蒙之正也物欲所蔽冥然罔覺蒙之昏也乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需自大壯來以五為主需者須待之義乾剛在下坎險在前三陽自下而升未可遽進需之本體也有孚者二用而柔則為既濟健體既變上與五孚不陷乎險安有困窮之理光亨者乾用而離離為日也所以有孚以其能亨需之變體也以本體言之五居天位守剛為貞是謂正中其吉宜也以變體言之二剛既往坎離交矣上下同心以濟天下之險難何功之不可成故曰利涉大川也象曰雲上于天需君子以飲食宴樂雲升天上萬物有雨澤之望君居人上天下亦望其生養而安佚之人君能慰天下之望則可以享四海九州之奉所謂後天下之樂而樂也初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也郊在兊澤之上指四也初用而柔失四之應為需于郊四居險下初與之敵犯乎難也若欲不犯乎難則必復還其剛所謂行也柔既利用剛斯有應為得其常何咎之有九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也坎中為沙二用而柔上與五孚為三所間不容不需離體中虛其心寬平可以待時衍在中也進而遇間不能不小有言然當位而應三何能間之終獲吉也九三需于泥致寇至象曰需于泥災在外也自我致冦敬慎不敗也上入坎窞為泥三用而柔失上之應需于泥也兩柔相敵災在外也冦戎之來我實致之若能守剛不用敬而又謹本與上應冦從何來又安至敗六四需于血出自穴象曰需于血順以聼也需本大壯四五相易以柔變剛隂為血需于血也居當其位故能順以聼之隂耦中虛有穴之象用之而剛坎險既變出自穴也夫變此爻雖為臀無膚而繼之以牽羊悔亡者但宜為需而不可為夬也九五需于酒食貞吉象曰酒食貞吉以中正也坎為水酒食之象五位剛中為需之主天下之人待之以養者也守正乃吉此爻於彖兼亨貞二義爻但為貞上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也上守柔不用入于穴也然三陽在下遲遲而進勢不可遏而上獨與三為應未免有危用之而剛變坎為巽恭敬以待之終可獲吉以剛居隂雖不當位未為大失也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也訟自遁來以二為主訟有相違之義乾剛在上坎險在下中互離為言險健相值而有言所以成訟訟之本體也二用而柔變險為順上應乎五是謂有孚二五剛敵窒也動而有悔惕也所以有孚以其因窒而惕故不克訟訟之變體也以本體言之二之剛自三來居位得中非不為吉然以卑抗尊終必有凶故曰訟不可成也以變體言之五為大人二以柔應尚乎中正何利如之若不能變則剛處險中上無其應為入于淵故曰不利涉大川也象曰天與水違行訟君子以作事謀始天一生水其本同也天運而上水流而下其行相違訟之象也人之相與其初未有不同分與毫釐天淵回隔君子作事可不謀其始哉坎水為智互離為言謀也初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也永剛也事變也不永所事不變為剛以敵乎四蓋知訟之不可長也當訟之時以柔居下為二所間不能不小有言然有應在上其辨自明終獲吉也四互離為言為明九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也二五剛敵本自成訟二用而柔反成相應不能訟矣始敵而終避變險為順復其本位歸而逋也坤為邑三隂為三百户下不敢言上而順避之可以自全與其邑人皆免於災是以無眚不然以卑抗尊災患之至乃其自取彖言有孚窒惕此爻也六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也三本與上應是上有舊德於三也隂資陽以為養是三食上之德也位雖不當所宜守正若變為姤則危矣知其危而不變焉終可獲吉順以從上也或用而剛以從王事位雖得當而無其應何能免咎無成者戒其不必守剛而不易也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也四與初應本不能訟用之而柔反即五以聽命渝其本志雖失乎初之應然能守柔為貞安以從君不失臣道斯可獲吉於卦為渙涣有丘匪夷所思此爻之變也九五訟元吉象曰訟元吉以中正也五為聼訟之主其德剛健居中守正是以元吉二雖敵應中變為柔以從之彖所謂利見大人此也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也上與三本相應或用而柔變乾為兊雨柔相值所以成訟上當位而三不當位以下訟上故上勝而三負錫之鞶帶上受五之服也剛而為柔鞶帶之象天而為澤錫命之象兊西為夕終朝也於卦為困之臲卼復還其剛是以三褫褫解也蓋以訟得服不足以起人之敬故愧而自解之以見人之訟雖勝亦耻未有不悔者也坎下坤上師貞丈人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣師自復來以二為主二之陽在中衆隂順之於外大將統軍之象坎位北方將主殺伐坤在其前南征也升之用見大人南征吉者用而為師也五隂耦立有五人為伍五旅為師之象丈人者長於衆人者也師有丈人以主之不宜變為柔也坤為衆二守正能以正用衆則可以為王者之師矣剛居坎中上應乎五坎為險坤為順兵凶器戰危事險也以至仁伐不仁順也驅民於鋒鏑之下疑若毒之矣而民從之者順民心之所欲也行師本有咎受君之任權有所歸動罔不吉可以免咎矣丈人子夏傳作大人象曰地中有水師君子以容民畜衆地中有水藏至險於至順之中不動如地流轉如水師之象也水由地中行地所以容水振河海而不泄地所以畜水比閭族黨州鄉以容其民伍兩卒旅師軍以畜其衆君子體師之象如此初六師出以律否臧凶象曰師出以律失律凶也律紀律也師行必從帥然後有律以隂從陽初不可變也否則用之而剛於卦為臨二陽浸長上與四應雖若善矣然用之行師是一師而二主安得不凶知莊子曰有帥而不從臨孰甚焉果遇必敗彘子尸之九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也二以陽剛為師之主所謂丈人也在師之中而獲吉者五能假之以權委任既專事功乃立何天之寵又安有咎王三錫命者一命受服二命受爵三命受車馬五歷三爻而應乎二也坤為衆為國總師得人衆安國寧王命之錫豈私於二哉錫命者五以兵權屬之二故五為柔而二為剛也六三師或輿尸凶象曰師或輿尸大無功也二為師之主三以柔從之升用見大人指此爻也或用而剛則師有二主是為輿尸節制不一安得有功所以凶也輿衆也尸主也大陽也六四師左次無咎象曰左次無咎未失常也師尚右左次者置之不用之地四既不用下雖無應然以柔從二其於常道亦未為失何咎之有當位為坎六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也五用而剛於卦為坎上下皆坎未免敵應二居地上為田坎中之陽為禽五當位二不當位卑而抗尊於理為逆則五執辭伐罪於勢為利何咎之有互艮言也若五不用但以兵權屬之二互震為長子在師中吉以中行也苟復使他爻為剛以分二之權則是弟子輿尸不能成功使不當者非將之罪也五雖守正不用而用他爻亦不免凶上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也五曰利執言上曰大君有命是變師為比矣行師之時則以權假諸人功成之後則總權歸諸己開國為諸侯承家為大夫正其功而賞之也上當守柔從五變則為後夫凶亂之道也故戒以勿用坤下坎上比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比自剝來以五為主剛居天位為衆所輔是之謂比下皆順從是以獲吉凡卦以內卦為初筮外卦為原筮蒙本震以初之剛易二之柔故曰初筮比本剝以上之剛易五之柔故曰原筮二卦之彖皆言以剛中者以剛居二五具在兩柔之中也元永貞者五為卦之主守剛為正當位有應吉又何咎不寧方來者比既有主天下之民林林揔揔不能自安方且即我而求安一陽居尊上下五隂皆來應之也後夫者夫陽也上居卦外為後若用而剛則不比乎五其道既窮安得不凶原再也原廟原蠶皆再義也象曰地上有水比先王以建萬國親諸侯地上之水支流必入於江河江河必朝宗于海諸侯者萬國之君也率土之濱莫非王臣以厥臣達王惟邦君建萬國親諸侯所以合比之勢也大象舉先王者七比豫觀噬嗑復無妄渙是皆古先王之事聖人設象稽之以為驗者也初六有孚比之無咎有孚盈缶終來有它吉象曰比之初六有它吉也諸卦多以應爻為孚此卦以五為主諸爻皆往比之為孚也初在卦下同衆隂以比乎五何咎之有用之而剛於卦為屯陽為盈坤土為缶變坤為震虛而實之盈缶之象初既為陽四來應之是亦有孚則吉不在比而在屯矣故曰終來有它吉屯之初九利建侯大得民者即此爻之用也它之一辭聖人為世變慮深矣六二比之自內貞吉象曰比之自內不自失也二以柔居隂與五相應自內比外守正則吉若用而剛是自失其本然之柔而與五為敵矣六三比之匪人象曰比之匪人不亦傷乎三用而剛於卦為蹇當比之時群隂皆應乎五三獨變剛使上之柔下比乎我所謂比之匪人蹇之不利東北正此爻也六四外比之貞吉象曰外比於賢以從上也五在四外四上比五守正則吉五位剛中賢君也萃之利見大人亨者用為比也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也五居天位守正得中其德剛明天下從之顯比之象也用三驅者虞人萊田百步而為一表凡為三表每驅至表而止驅之至三獵事乃畢二居地上為田故取田獵之義師以剛居二為逆比以柔居二為順師之五變柔為剛於卦為坎二五剛敵則為田有禽比之五以剛居尊二但守其柔則為田無禽反師為比是舍逆取順無復有禽在前矣坤為邑二在坤中邑人也本與五孚不勞告誡惟上所使其吉宜也上六比之無首凶象曰比之無首無所終也比之者上以柔比乎五也無首者不可為陽也用之而剛則為後夫故聖人戒以無之一字知其終之必凶也乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也小畜自夬來以四為主未為小畜猶是大有五柔居尊上下皆應乎五易而為小畜四柔得位上下皆應乎四隂小陽大以小畜大故曰小畜乾之三陽自下而進巽以一隂當乎其前下健上巽所以能畜五剛居中柔來居四臣比乎君其志得行故曰乃亨密雲不雨者二三四互兊在乾之上澤之氣上於天隂雲欲雨巽為風自兊方而來吹使離之也變為純乾則天德周流矣自我西郊者凡風起自北東南皆能有雨惟正西則無雨縱有微雨不能潤物尚往者宜變小畜為乾也施未行者不當易大有為小畜也文王三分天下有其二顯于西土而澤未及乎天下其小畜之時乎凡一隂之卦皆言變小畜有當變之義而不言者文王有君民之大德而懷事君之小心聖人之情見乎辭也自我指四主爻也象曰風行天上小畜君子以懿文德風行天上因雲乃見其聚也為章于天其散也太虛清明聚而必散故曰小畜君子和順積中而英華發外是特見其小者耳若夫大德周流與天為一則不可得而形容矣初九復自道何其咎吉象曰復自道其義吉也初以剛居陽為當其位復自道者不變其本然之剛也上與四應何咎之有理應吉也巽變小畜利武人之貞此爻也九二牽復吉象曰牽復在中亦不自失也二用而柔於卦為家人利女貞此爻也牽柔道也柔自外來復其本位得中而應所以為吉不自失者初既當位二亦不失其本然之柔也九三輿説輻夫妻反目象曰夫妻反目不能正室也離為輿三在互離之下輻也變剛為柔説輻也與上相應為夫妻夫柔妻剛必至反目不能正室者三上俱不當位也於卦為中孚肖離有目之象六四有孚血去惕出無咎象曰有孚惕出上合志也四柔五剛是為有孚即彖所謂剛應而志行也隂為血悔為惕四五相易復還大有則血去惕出矣上合志者柔得尊位而剛應之何咎之有九五有孚攣如富以其鄰象曰有孚攣如不獨富也五剛四柔君臣相孚固結而不可解攣如也巽為手為繩攣如之象陽為富與四為鄰隂受陽之施則四變柔為剛於卦為純乾不獨五之富也於四而言變為大有於五而言變為乾皆以君位為主也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也上用而柔變巽為坎既雨也以柔居隂得其所安既處也德指剛爻言也三五皆剛德積也上配三乘五尚而復載也三四五互離為車柔在其上載婦也貞厲者守剛為貞變則必危知其危則不變矣以本體言之巽納辛為生魄明不盈月幾望也陽為君子雖不當位未為大失往而為柔則居可疑之地其凶宜也兊下乾上履虎尾不嘻人亨彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也履自姤來以三為主未為履時猶是同人同人以柔居二有五之應履以柔居三履四之剛上卦乾三陽為寅虎之相也上為首則四為尾三履其後其體既柔位復不當必為所噬履之本體也下兊為説以説應乾則將變為純乾同體皆剛又復誰噬履虎尾不嘻人而繫之以亨者履之變體也既變為乾九五剛中守正尊履帝位而不疚者無六三之隂間於其中六爻皆剛渾然天體所以光明也象曰上天下澤履君子以辨上下定民志上天下澤何取乎履大澤浩渺與天相連若無上下之分實有天淵之間君之於民雖同類也而上下之分截然如天淵之不可紊若非明辨則莫知所尊民志何自而定禮所以别嫌明微而使民各安其分也互離居上下之間故曰辨初九素履往無咎象曰素履之往獨行願也初爻為足不變其本然之剛素履也用之而柔則剛往矣上與四應何咎之有獨行願者居履之初變而有孚其志行矣九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也二用而柔上與五應無妄之不耕穫不災畬者此爻也變兑為震震為大塗以柔居隂當位而安履道坦坦也幽人貞者守柔為正也柔應乎剛既得中道而不能自亂所以為吉六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也三以柔居陽近窺乎四視失其當眇之象也隨四之剛履失其當跛之象也眇而視何足為明跛而履何足以行蓋變姤為履居既失位所以取嘻人之凶用之而剛是謂武人大君者五剛居尊也五之君欲率衆剛以決三之柔三以説應乾志順乎剛則將變為純乾是為大君而用武也彖言不嘻人亨指此爻之變也為去聲九四履虎尾訴訴終吉象曰訴訴終吉志行也四居乾之下為虎尾失位無應三履其後未見其吉用之而柔變乾為巽二三四互震訴訴者巽順震懼之貌於卦為中孚與五相合行而得志所以終吉九五夬履貞厲象曰夬履貞厲位正當也夬決也九五之君率衆剛以決六三之柔所冝守剛為貞若變為睽則危知其危而不變焉三之柔終決去而為純乾則履帝位而不疚矣位正當者以剛居陽也上九視履考祥其旋元吉象曰元吉在上大有慶也眇能視跛能履三也上與之應於視履之間考其休祥則知三之必凶反觀諸身以剛居上有自然之元吉旋反也大陽也為陽不變則有慶變則為兊之未光矣易通卷一
