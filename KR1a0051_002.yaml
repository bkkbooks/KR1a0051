body:
  text: 易通卷二宋趙以夫撰乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是大地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也泰自坤來以三為主未為泰時猶是臨體六三為隂小也既變為泰九三為陽大也隂消陽長小往大來也當位而應所以為吉臨進而泰是之謂亨天本居上地本居下今天氣下降地氣上騰四可與三通而為出乎震三可與四通而為説乎兊天地交而萬物通也五居君位宜剛而柔降心以接其臣二居臣位宜柔而剛直道以事其君上下交而其志同也三陽為寅春氣既應轉嚴凝而為溫厚而內陽而外隂天道之泰也三為主爻互震木在坤土之中生意條達內健而外順地道之泰也君子在內陽剛日進小人在外隂柔日退君子道長小人道消人道之泰也則是云者因小往大來之義以明三才雖異而陽進隂退之吉則同也凡亨字繫於卦名之下皆指來卦而言泰之亨繫於小往大來吉之下何也蓋小往大來正言來卦之義文王於泰之彖辭發其例孔子又於賁之釋彖申言之曰柔來而文剛故亨他卦可以類推矣象曰天地交泰后以財成天地之道輔相天地之宜以左右民天之氣下交乎地地之氣上交乎天所以為泰泰者通也乾下坤上互震兊於中爻日中星鳥以殷仲春宵中星虛以殷仲秋隂陽適平無過不及財成天地之道也寅賓出日平秩東作寅餞納日平秩西成春耕秋斂咸遂其生輔相天地之宜也春則厥民析秋則厥民夷正之直之輔之翼之以左右民也泰為孟春而震兊居一卦之中寅為嵗首而卯酉在二分之月聖人因天地交泰而發明財成輔相左右之義也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也初用而柔茅柔草也茹茅之膚也地中生木柔以時升秀拔而出也然初當泰長之時不宜為柔彚者三陽同類也征者復還其剛則柔往矣當位有應何吉如之志在外者心乎四之孚也升之初六允升大吉用為此爻也茅茹與蘆茹竹茹義同九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也當泰之時乾陽在下坤隂在上坤地廣袤有荒之象天包乎地包荒也二居乾中用之而柔互坎在前馮河之象失五之應則遐遺矣失陽之類則朋亡矣復還其剛則遐不遺朋不亡六五之君乃以柔應之得尚于中行也光大者以陽爻言為泰而不為明夷也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也三以剛居陽當位平也若用而柔安者必危無平不陂也三既為陽小者往矣若又為隂盈者必虛無往不復也惟艱難守正則可免咎勿恤不必憂也其孚上應之也隂資陽以為養于食有福也三與四天地之際也隂陽消長當於其際觀之六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也陽為富為實上三爻皆隂有翩翩不富皆失實之象五與四為剛則上迫乎隂柔之五故鄰戒之今不為剛而但為柔則鄰不戒之矣下有初之應而上不為君所忌中心願者五之志得也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也五互震二互兊震為長男兊為少女歸妹之象然五柔二剛於位未當五君位也用之而剛四以柔上配之帝乙歸妹也隂承乎陽受君之福以祉也得中而行適其所願吉孰大焉帝乙商之賢君也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也上用而剛變坤為艮山在地之上城也二三四互兊澤在山之下城復于隍也當泰之時三陽在內上當順以從之今乃變為剛以與之敵失位無應其命既亂勢何能久猶城之危必復于隍也上本坤為衆師也居卦之外邑也勿用師自邑告命者上自告其邑人但當為柔以孚乎三不可為剛以臨乎五也貞吝者守剛為正不還其柔吝也坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也否自乾來以三為主未為否時猶是遁體九三為陽大也既變為否六三為隂小也陽消隂長大往小來也否之時用非其人不利於君子之守正者蓋變剛為柔則小人用事三之君子不能安其位矣天穹然於上地隤然於下天氣不降地氣不騰四不得與三通而不能齊乎巽三不得與四通而不能成乎艮天地不交而萬物不通也剛不下交闕初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也初柔在下故亦曰茅以其彚三隂同類也貞吉不變而吉也志在君者九五休否之主在上初欲從之也亨者用之而剛於卦為無妄剛自外來而為主於內此爻也六二包承小人吉大人否亨象曰大人否亨不亂羣也五以剛下包乎二二以柔上承乎五故曰包承小人隂也不變則為柔而與五應故吉大人陽也變則為剛而與五敵故否亨者復還其柔則三隂同類各得其應所謂不亂羣也六三包羞象曰包羞位不當也二為否之主連羣隂而進將以剝乎陽然三陽在上其朋尚盛三居不當位為陽所包亦可羞也此言小人引類以傾君子君子居高位方且包容之彼小人者宜自知所愧哉若用而剛則居當其位為遁之畜臣妾吉矣九四有命無咎疇離祉象曰有命無咎志行也四用而柔於卦為觀當否之時四居大臣之位播告王命達於在下之羣隂其志得行何咎之有群隂亦上朋乎四以觀中正之君並受其福疇有離乎祉之外者疇誰也離違也祉福也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也休美也五剛居尊守正不變於位為當能新美天下之否為大人則吉也用之而柔變乾為離中虛於木為科上稿稿桑中空上有方苞之條桑本柔木方苞之桑尤其柔者也當否之時以剛居上猶恐未能休否况復變而為柔下無其應安得不危其亡其亡重言喪邦之易猶方苞之桑而繫以為固何可久也上九傾否先否後喜象曰否終則傾何可長也上用而柔變乾為兊於卦為萃否極則傾無終否之理順以從五則轉否而喜矣當否之時五為大人上豈宜長守其剛而不知變也離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志同人自姤來以二為主二以柔居隂得位得中上應乎五五居乾體之中乾天也天生蒸民賦形肖貌均氣同體故曰同人同人曰者申言天人無間之義也二爻為地地上為野亨者二用而剛變為純乾人與天一同人之變體也二復為柔在地之位居離之中離中虛有舟之象二三四互巽為風舟而得風涉川則利下乾變離是謂乾行君臣同心何向不濟離為文明乾為健文明則粲然相接健則純亦不已五以剛居中守正不變下與二應利君子貞也君子得同人之道已與人一於天下之志無所不通凡欲夀欲富欲安欲逸者皆有以適其願非君子孰能之同人之本體也象曰天與火同人君子以類族辨物天居上火炎上人首居上自然之同也中國夷狄類族不同而首之居上則同譬諸草木雖有區别而生意向上莫不皆同君子以人之類族而辨乎物則可以知大同之道矣初九同人于門無咎象曰出門同人又誰咎也初用而柔變離為艮艮為門關四在其上初與之應出門同人何咎之有六二同人于宗吝象曰同人于宗吝道也二用而剛六爻皆陽同於其宗是為純乾不還其柔雖謂之吝揆之於道則當然也九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也離為戈兵戎也三互巽為木莽也伏戎于莽與上非應剛相敵也若用而柔於卦為無妄互艮為山髙陵也升其高陵與上相應至三嵗之久而寇戎不興不為敵而為同矣安行者行將安之言不可復還為剛也無妄六三邑人之災變為同人也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也下卦離中虛外堅有墉之象四乘其上與初為敵初當位而四不當位則其困在四矣用之而柔弗與初敵上順乎五所以為吉是謂困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也同人之先為姤二五居中以剛相直是以號咷姤之後為同人五剛二柔相孚而喜是以笑也以剛敵剛大師相克也以柔應剛大師相遇也相克故號咷相遇故笑不言其始之異為可悲無以見其終之同為可喜彖言中正而應此爻也上九同人于郊無悔象曰同人于郊志未得也上用而柔變乾為兊兊為澤郊在澤外近比乎五同人于郊也無悔者當位有應不必復還其剛也志未得者本不相應其心不快是以貴乎變也乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨大有自夬來以五為主柔得尊位大中者五君位居衆陽之中也上下五剛應乎一柔所有者大也下乾上離內剛健而外文明大有之本體也上爻為天五以柔順之應乎天也五用而剛乃純乎天與時偕行大有之變體也卦無它辭惟言元亨者人君以柔制剛雖可以有天下非所以運天下必用為純乾乃得君道之正故曰是以元亨也象曰火在天上大有君子以遏惡揚善順天休命離在乾上大明當天物無不照大有之義也陽主善隂主惡火在天上則陽盛而隂消矣人君以明居上凡天下之善惡皆無所遁善者顯揚之惡者遏止之上天之命不過如此代天而行是謂順天之休命也初九無交害匪咎艱則無咎象曰大有初九無交害也初用而柔應四為交而戒以無交者大有之時柔得尊位初乃用九不從乎五必至於害匪咎者本非有咎變柔以交四則為害而有咎矣惟當艱以守之上孚乎五則可免咎故鼎之初欲變為大有也九二大車以載有攸往無咎象曰大車以載積中不敗也二用而柔變乾為離離為車上下皆離大車以載也復還其剛則柔往矣虛而實之是有物以積乎車之中上與五應守剛不敗何咎之有九三公用亨于天子小人弗克象曰公用亨于天子小人害也卦本夬五上相易而為大有五為君位是公用亨于天子也五以柔居尊三為臣位但當同衆剛以應乎五若用而柔是為暌之小人適以害治必不能從乎君矣暌小事吉亦欲用為大有也凡爻辭言公者皆指五也九四匪其彭無咎象曰匪其彭無咎明辨晢也四用而柔於卦為大畜當大有之時諸爻皆以剛應乎五四獨不然何也蓋四居大臣之位衆剛並進上迫乎五其勢太盛彭盛也匪其彭者勿居其盛然後免咎也明哲保身其四之謂歟六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也柔得尊位大中而上下應之厥孚交如也厥孚者指諸爻交孚乎五以諸爻之信而發五之志也然世當大有治極文明寬裕溫柔雖足以有容非發強剛毅不足以有執五用而剛於卦為乾剛健中正當位而安威權自出有不可犯之勢何以備為威如之吉也彖辭所謂元亨者此也易中言易者三皆指當位也上九自天祐之吉無不利象曰大有上吉自天祐也卦本夬五剛上柔易為大有上天位也五君位也柔從乎剛君之尊天也上孚乎五天之祐君也是謂上吉皇天眷命奄有四海為天下君何不利之有艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也謙自復來以三為主未為謙時猶是師體師以剛居二行師乃吉謙以剛居三勞而有終故坤之彖曰元亨者二用為師也又曰君子有攸往者三用為謙也亨者指來卦言也確然在上天也一陽退而居三為艮互坎天道下濟而光明也隤然在下地也一陽進而居三變震為艮地道卑而上行也一陽在上為剝今乃上為隂而三為陽虧盈而益謙也一陽在下為復今乃初為隂而三為陽變盈而流謙也三互坎為月月之魄至坤而盡鬼也月之明自震而生神也萬物終始乎艮艮為下弦明魄中分兼鬼神之義艮在坤上盈不可久艮在坤下勞而有終鬼神害盈而福謙也以剛居四於卦為豫未免致疑以剛居三於卦為謙可以獲吉人道惡盈而好謙也三在艮之上尊而光也三在坤之下卑而不可踰也君子之終止乎剛也坤之君子攸行乃終有慶用為謙也象曰地中有山謙君子以裒多益寡稱物平施地中有山髙而處下謙之象也以已下人而不自高以善與人而不自有取己之有餘以增人之不足稱物而施適平而止謙之道上坤下艮互坎於中水中之山也天下之平無過乎水平者水停之盛稱物之則也陽為施初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也三在坤下卑而不可踰也初用而剛又在其下卑遜自守謙而益謙君子之德也互坎在前當位而應吉之道也六二鳴謙貞吉象曰鳴謙貞吉中心得也二用而剛於卦為升陽能倡鳴謙也守剛為貞五以柔應之中心相孚得其所願其吉宜也九三勞謙君子有終吉象曰勞謙君子萬民服也三為卦之主以剛居陽屈於三隂之下謙而不憚其勞也互體坎為勞卦謙至於勞人之所難惟君子秉心之剛乃能終久不變所以吉也一陽五隂上下從之萬民服也六四無不利撝謙象曰無不利撝謙不違則也四以柔居隂於位為當雖無初之應而下宗乎三無不利者三四皆利也撝字從手以柔接剛有撝之義不違則者能守柔以從乎三不為剛以迫乎五也小過九四勿用永貞者欲其變為謙也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也陽為富不富不為陽也四與上五之鄰也不富以其鄰者五但為柔而四上亦不為剛皆從乎三也利用侵伐者五用而剛居當其位權自上出三終變為柔以從之於卦為比所謂大蹇朋來是也不服者指三為剛以敵五也所以征之無不利者上宜為剛三宜為柔也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上用而剛於卦為艮陽能倡鳴謙也上下敵應志未得也利用者復還其柔以三為主則可行師矣一剛五柔有師之義邑國坤也坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉豫自剝來以四為主未為豫時猶是比體四五相易君臣交孚其志得行坤順而震動以順而動所以為豫一陽天氣也動乎地上生意流行萬物發育和之至也震為侯坤為衆一陽統五隂利建侯行師也以和致和天地且不能違而况於人乎天秉陽地秉隂播五行於四時和而后月生互坎為月受日之光三日生明載魄於庚震納庚也月窮為晦藏明於乙坤納乙也日月不過而四時不忒也震為威在坤上互艮於中威止於上衆止於下刑罰清而民服也時當春和推廣天地好生之德此豫之時義所以為大也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考震雷出於坤地之上奮而有聲驚蟄之候勾萌甲拆萬物和暢豫之象也震為聲樂也互坎為黃鍾黃鍾下生林鍾林鍾上生太蔟坤在下互艮在其上也黃鍾天統林鍾地統太蔟人統三統相通律吕諧和樂之成也美盛德之形容以其成功告於神明萬物本乎天人本乎祖所以郊祀明堂以祖考配上帝也帝出乎震艮為門闕宗廟之象初六鳴豫凶象曰初六鳴豫志窮凶也初用而剛於卦為震陽能倡鳴豫也上下敵應其志則窮凶可知已六二介于石不終日貞吉象曰不終日貞吉以中正也二用而剛處險之中屹然不移介于石也互離為日復還其柔離體既變不終日也當豫之時四以一剛為卦之主上下應之二居中守正所以獲吉解之利西南者用為此爻也六三盱豫悔遲有悔象曰盱豫有悔位不當也盱仰視也三無上之應而視四以為豫悔遲者遲回熟視而不即變也位既不當是以貴乎有悔若用而剛於卦為小過則當位有應矣九四由豫大有得勿疑朋盍簮象曰由豫大有得志大行也四居大臣之位為豫之主四方大和由我而致剛應志行大有得也然位迫乎五權盛衆從易以致疑若以社稷為心勿以致疑何事不濟伊周之事業是已衆柔為髮一剛貫其中髮之有簮也安有髮之柔順而不從簮乎處豫之時與坤不同若坤之四則不敢用為豫也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也五以柔乘四之剛威權下移守貞不用君弱臣強所以為疾卦本比五剛得中有應為恆四為柔以從之君臣分義亘萬古而常存故曰不死言比不宜易為豫也上六冥豫成有渝無咎象曰冥豫在上何可長也豫有二義和而不流豫之順也耽樂忘返豫之冥也上處卦之終隂極而冥一成不變又安能久有渝者變也用之而剛於卦為晉明出地上何咎之有震下兊上隨元亨利貞無咎彖曰隨剛來而下柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉隨自否來以初為主當否之世上下不交而天下無邦今上九之剛下居乎初以貴下賤此動彼恱隨之義也元亨者初用而柔於卦為萃人心皆聚乎五隨之變體也利貞者初守正不用猶屯卦之利建侯人心皆歸乎初隨之本體也變與不變皆可無咎天難諶命靡常民罔常懷懷于有仁天下隨時也不寧惟是天地之盈虛萬物之榮悴人之行止動靜皆不能違乎時其義豈不大哉象曰澤中有雷隨君子以嚮晦入宴息兊為正秋秋分之候雷乃收聲隨時而靜也澤中有雷雷藏於澤也兊西為夕故曰嚮晦震動而艮止之故曰入宴息君子夜以安身亦隨時之義也初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也官主也渝變也官有渝者言初為隨之主變而應四不若守正為吉也用之而柔必舍四而孚五五在互艮門闕之上出門而交也志在乎君可以有功雖不當位亦未為失彖言元亨利貞此爻用不用皆可也六二係小子失丈夫象曰係小子弗兼與也小子初也丈夫五也二與五孚若不係于初則失五之應二者不可得兼故聖人以弗兼與戒之此與屯六二匪冦婚媾同義六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也丈夫五也小子初也三與初五皆不相應然五居君位宜從五而舍初故曰志舍下也以隂隨陽以臣求君不失其道所以為得守貞不用何利如之九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也隂隨陽者也當隨之時初為卦主五居君位二與三不隨初則隨五今四近乎五守剛為正而使二三隨之固有獲矣豈為臣之義乎其凶宜也用之而柔於卦為屯應初比五均曰有孚然以道言之臣當承君舍初比五心迹昭明道之所存功所由立初交五曰有功既為不失四孚五曰明功又復何咎九五孚于嘉吉象曰孚于嘉吉位正中也婚日嘉禮亦曰嘉耦當隨之時五剛居中守正不變則二之柔不隨初而隨五為孚于嘉得其所配是以吉也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也易言文王之事多取兊體西山岐山西郊皆兊方文王顯于西土也拘係之羑里時也復使為伯乃從維之也上處隨之極下無其應惟當順以從君王用亨于西山者卦本否亨而為隨變乾為兊乃有西山之象王五也上變剛為柔是王用之也當否之時上下不交上乃為柔以從乎五此文王事殷之心也巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也蠱自泰來以上為主乾初九之剛上而為艮坤上六之柔下而為巽泰通之餘己安已治下巽而莫豫違上止而不復有為世道所以頽壞而不可振起蠱之本體也元亨者初用而剛作而新之天下乃治於卦為大畜互震木於兊澤之上是謂涉川往而有為何向不濟蠱之變體也主爻在上而言初爻之變何也蓋變泰為蠱剛往居上而初乃為柔則失位無應必再變為大畜則其蠱亨矣乾納甲巽納辛方其為泰下體乾也初爻甲子二爻甲寅三爻甲辰先甲三日也變泰為蠱下體巽也則納辛矣今又變蠱為大畜下體仍乾乾復納甲後甲三日也終則有始循環不窮是謂天行泰極而蠱蠱則壞矣能亨其蠱斯可致治天運推移窮則必變人君所宜觀象也象曰山下有風蠱君子以振民育德風之洞穴多在大山深下之處風之作也怒號震動草木禽獸皆為之不寧其所以蠱壞於山者可知風俗之蠱有教化以鼓動之所以振民也人心之蠱有理義以涵養之所以育德也下巽為風振民之象上艮為山育德之象初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也卦本泰下乾為父初九之剛上而為艮父往矣考也變乾為巽父之蠱也用之而剛幹父之蠱也巽復為乾則考可以免咎矣復還其柔則為蠱而危故大畜之初九曰有厲利己有厲者變為蠱也知其危而不變焉則當位有應可保終吉矣父之在也而幹其蠱可以幾諌父之沒也而幹其蠱承之以意而已即繼志述事之義也九二幹母之蠱不可貞象曰幹母之蠱得中道也卦本泰上坤為母變坤為艮母之蠱也五以柔居尊二以剛應之幹母之蠱也剛柔相孚乃得中道不可貞者幹母之蠱與幹父之蠱不同不宜專以剛為尚又當柔行巽入置母於無過之地可也此爻當貞而戒以不可貞者慮其過乎剛也九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也上之剛自乾而來父也三以剛居陽雖能幹蠱然與上相直未免過剛非事父幾諫有隱無犯之道小有悔者用柔以濟之終可以無大過矣六四裕父之蠱往見吝象曰裕父之蠱往未得也上為父諸爻皆以剛幹其蠱四以柔居隂非能幹者也當蠱壞之時以寬柔之道為正救之方裕父之蠱也用之而剛則柔往矣於卦為鼎而曰見吝何也剛不當位上迫乎五不可得而往安得不吝是此爻不宜變也六五幹父之蠱用譽象曰幹父用譽承以德也上為父五用而剛幹父之蠱也於卦為巽守貞則吉用譽者變為剛則有譽也承以德者上既為剛五復為剛以從之也上九不事王侯高尚其事象曰不事王侯志可則也王侯王公王臣皆臣也事變也以剛居上不變為柔以應乎三不事王侯也卦本泰剛自外來而為主於上不變焉高尚其事也賢者處世道蠱壞之極超然高蹈不屈道以求合而五之君能守柔以尊之豈非以其志之可則哉通變之謂事聖人借不事之辭以明不可變之義兊下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也臨自坤來以二為主二陽浸長四隂漸消由內臨外故謂之臨下兊為説上坤為順二以剛居中應乎五之柔説而能順內外相孚臨之為義無過乎此剛中而應指二五言也元亨者二用而柔臨之變體也利貞者二剛不變臨之本體也大亨雖吉而必以正者剛貴乎長有成乾之勢天道之當然也至于八月有凶者一陽始於復二陽臨以至六陽而為乾陽極矣一隂生於下為姤二隂遁一爻當一月自復至遁為八月聖人於二陽之方長而預言二隂之必至蓋盛必有衰長必有消自然之理也一陽於辰為子二陽為丑二隂為未自丑至未歷時尚久而曰消不久者戒辭也日陽也月隂也復卦言陽之復故以日言臨卦言隂之反故以月言臨有二義自內臨外謂之臨自上臨下亦謂之臨故彖象分言之觀之義亦然象曰澤上有地臨君子以教思無窮容保民無疆澤能容水地在澤上下臨乎澤故謂之臨兊曰講習漸潤之益其思無窮坤曰厚載包涵之廣其容無疆君子臨民以道豈徒以勢位哉初九咸臨貞吉象曰咸臨貞吉志行正也初與四應隂陽相感故曰咸臨卦自坤來初剛當位其志得行守正不變所以吉也九二咸臨吉無不利象曰咸臨吉無不利未順命也二應乎五亦曰咸臨無不利者剛中而應二五皆利也當二陽方長之時為君子者所宜引類而進以道正君未可徒順上之命以為容恱也未順命者二剛而五柔也彖兼亨貞二義爻但言貞六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也三以柔居陽位既不當下乘二剛説以從之是謂甘臨何利之有既憂之則柔用而剛於卦為泰可免咎矣六四至臨無咎象曰至臨無咎位當也四柔不變於位為當爻居坤之下兊之上臨之切近者也故曰至臨與初相應何咎之有六五知臨大君之宜吉象曰大君之宜行中之謂也五用而剛變坤為坎坎水為知聰明睿知足以有臨與四相孚大君之宜也於卦為節行而得中所以為吉上六敦臨吉無咎象曰敦臨之吉志在內也上用而剛於卦為損變坤為艮敦之義也內孚乎五吉又何咎凡卦坤變艮艮變坤皆以敦言厚而加厚也坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣觀自乾來以四為主大觀在上指九五而言下恭順而仰望乎上上謙巽而俯察乎下五以陽明位四隂之上居中守正以觀天下觀之義也巽為風風無形而能鼓舞萬物故易中言神與廟多取象焉巽為手王入太室盥手執爵酌鬯於地主祭者之事也執事薦饌獻腥獻熟助祭者之職也四與五皆巽體同一祭祀之事然四雖卦主臣道也特助祭而薦者耳交神明之道當於祭主乎觀之所觀在五而不在四故曰觀盥而不薦四比於五為孚率下之三隂同觀乎五有顒然瞻仰之象故曰有孚顒若下觀而化也天之神道風之所為也聖人之神道設教命之所為也教命行乎四方猶風之行乎四時也風應候而至則四時不忒教命當於人心則天下服矣坤西南互艮東比四時也凡觀字皆平聲惟大觀去聲象曰風行地上觀先王以省方觀民設教風本無迹行乎地上所加者偃所觸者動人皆見之矣方民坤象也教巽象也周省四方觀察民俗而為之設教君子之德風也初六童觀小人無咎君子吝象曰初六童觀小人道也初在羣隂之下而仰觀乎五童觀也以隂宗陽亦可無咎然居既失位志復卑下是特小人之道若用而剛於卦為益其道大光則轉而為君子既為君子則吝於復還其柔矣六二窺觀利女貞象曰窺觀女貞亦可醜也大觀在上二五相應而言窺觀何也坤為闔户二居羣隂之中獨由户隙以窺五是妾婦之道也雖利亦醜六三觀我生進退象曰觀我生進退未失道也我生我之身也三用而剛於卦為漸有四之孚是我身為人所觀者也然大觀在上為三者但當守柔以觀五進而為剛不若退而為柔則不失從君之道矣六四觀國之光利用賓于王象曰觀國之光尚賓也五居君位在坤之上坤為國陽為光四以柔從五觀國之光也古者諸侯入見于王王以賔禮之忘勢而尚賢樂只君子邦家之光陽為主則隂為賔利用者卦本否四用而柔則為五之賔矣九五觀我生君子無咎象曰觀我生觀民也觀我生者五之君子守剛在上為天下之所觀何咎之有象言觀民者君子之道本諸身徴諸民即彖所謂中正以觀天下也上九觀其生君子無咎象曰觀其生志未平也上用而柔於卦為比觀其生者觀五之身也順以從君亦可免咎志未平者當觀之時衆隂皆觀乎五上守剛不比則為後夫於心終有未安是以貴乎變也易通卷二
