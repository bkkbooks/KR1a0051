body:
  text: 易通卷四宋趙以夫撰艮下兊上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣咸自否來以三為主隂陽交孚感之義也柔自内徃而居乎上剛自外來而居乎三柔上剛下所以為亨艮為少男兊為少女二氣感應以相與也九三艮之陽上六兊之隂男女之位皆當居之而安歡然相愛止而説也陽下交於隂而成和男下女也三惟不變斯與上孚是以亨利貞取女吉也下本坤上本乾三上相易天地感也始乎艮齊乎巽説乎兊萬物化生也五君二民中正而應聖人感人心也下艮互巽在乾之下巽順則和艮止則平天下和平也寂然不動性也感而遂通情也於其感而觀之天地萬物皆不外乎是矣象曰山上有澤咸君子以虚受人澤居乎山之下而氣蒸乎山之上巖谷竅穴雲生其中山澤通氣咸之象也山之中虚故於氣无所不納君子之心虛故於人无所不容咸之義也初六咸其拇象曰咸其拇志在外也拇者足之大指初以耦居下拇也上應乎四志在外也四剛初柔以柔應剛不失其為感之道也六二咸其腓凶居吉象曰雖凶居吉順不害也腓脛腨也腨形如卧魚之腹在股之下不能自舉隨股而動者也三為咸之主二比之若腓之附股然二本有五之應乃近隨乎三失其所感於理為逆安得不凶惟當守正順以從五則吉而无害矣九三咸其股執其隨徃吝象曰咸其股亦不處也志在隨人所執下也三用而柔變竒為耦有股之象居本當位可處而亦不處乃以一柔隨二剛之後所執卑下利可知矣柔宜徃而吝遂至於此徃則无咎矣或以三為主彖言利貞此爻不宜變也九四貞吉悔亡憧憧徃來朋從爾思象曰貞吉悔亡未感害也憧憧徃來未光大也諸爻皆言咸四獨不言者不求感也守剛為貞自可獲吉悔亡者不輕變也未感害者寂然不動何害之有若以其失位徃而為柔復以其无應來而為剛或徃或來憧憧靡定不能安於為剛必至變而為柔於卦為蹇上負五下乗三中无所主膠膠擾擾祇自惑耳未光大者不為陽也朋從爾思者不變則互乾三陽為朋初以柔應之從爾之思也九五咸其脢无悔象曰咸其脢志末也兊之上爻為口脢居口之下胷鬲之間與心同位不曰心而曰脢者剛中以正寂然不動不求感於人而人自感之上為卦之末志末者五與上孚心口相應也无悔者不宜變也五居心位而四言朋從爾思何也蓋以六爻象人之身四也猶姤之三為臀夬之四亦為臀咸之三為股明夷之二亦為股也上六咸其輔頰舌象曰咸其輔頰舌滕口説也兊為口輔頰舌皆口也上以柔比五之剛是之謂輔然本與三應未免有疑欲明其心能无言乎是以滕口説也巽下震上恒亨无咎利貞利有攸徃彖曰恒乆也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞乆於其道也天地之道恒乆而不已也利有攸徃終則有始也日月得天而能乆照四時變化而能乆成聖人乆於其道而天下化成觀其所恒而天地萬物之情可見矣恒自泰來以四為主剛本在初上而居四柔本在四下而居初剛上柔下所以為亨震以長男位乎外巽以長女位乎内内外有别何咎之有雷陽氣也風隂氣也陽倡而隂和雷風相與不相悖也内巽而外震順乎理而動也方其為泰剛柔本應亨而為恒其應亦同剛柔皆應也乆於其道主爻不變利貞也天地所以能長乆者隂陽不差歳時无易此恒之本體也利有攸徃指初也下體本乾變乾為巽初柔失位用之而剛巽復為乾柔徃剛來終則有始於卦為大壮剛健以動何利如之此恒之變體也以本體言之日出於震月生於兊在互體乾天之上日徃則月來月徃則日來日月得天而能乆照也震兊居春秋之中巽乾居夏冬之孟寒徃則暑來暑徃則寒來四時變化而能乆成也天徳而出寧日月照而四時行若晝夜之有經聖人乆於其道也巽在互乾之下為風為命令天下化成也天地之大萬物之多自其情之動者而觀之一闔一闢出機入機不恒能如是乎象曰雷風恒君子以立不易方雷風鼓舞若不可測然發聲於春收聲於秋雷之恒也上震為東互兊為西方也天有八風行乎四時風之恒也下巽東南互乾西北方也君子素其位而行不願乎其外處世之變不更所守君子之恒也初六浚恒貞凶无攸利象曰浚恒之凶始求深也卦本泰柔居四為當位易而居初入乎三陽之下是謂浚恒自卑其身以應乎四始求深也女而下男安得不凶守柔為貞必无所利大壮用為此爻則其孚窮矣彖言利貞而繼以利有攸徃者指初爻當變也九二悔亡象曰九二悔亡能乆中也悔亡者二以剛居隂雖不當位不可輕變也能守其剛上與五應居中而能乆常道也若用而柔雖為當位然无五之應而隨二剛之後則非恒矣九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也初浚恒五恒其徳皆不變三不恒其徳上振恒皆變也三用而柔於卦為解居二坎之中進退皆險故无所容二承其下亦以為羞故解之三曰負且乗致冦至也貞吝者守柔為正居既失位上又无應不能復還其剛吝也還其剛則為恒其徳矣九四田无禽象曰乆非其位安得禽也初為田雖應乎四而不為剛无禽也與比九五失前禽義同初以柔居陽既失其位遂為浚恒之凶又安得禽哉明泰不宜易而為恒也六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也恒其徳剛柔應也貞不變也六五老婦九二士夫大過變為此爻其義同也夫一而已婦人守正從之終身安得不吉制事以義夫子也惟婦是從安得不凶蓋柔居五而剛居二婦上於夫故設此戒上六振恒凶象曰振恒在上大无功也上用而剛變震為離振動也失位无應安得不凶大无功者為陽則无功也於卦為鼎而上九乃以吉言者蓋鼎卦五上相易有亨帝之義此卦上六變為剛以臨五所以凶也艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉遯自乾來以二為主未為遯時猶是姤體剛徃柔來遯而亨也方其為姤九五剛居中正雖為當位而下无其應及其為遯二用而柔乃孚乎五時之當行不可違也小利貞者二柔浸長得位得時不宜復變也由二言之固得臣道之正由卦言之則為二隂漸進君子見㡬而作之時也當遯則遯適時之宜其義豈不大哉象曰天下有山遯君子以逺小人不惡而嚴天之與山勢本遼絶山雖崒然而起似有陵上之意而天穹然蓋高自不可干遯之義也彼小人者近之則不遜逺之則怨惟君子為能處之上乾為君子下艮二隂為小人互巽於中巽而止之有不惡而嚴之象初六遯尾厲勿用有攸徃象曰遯尾之厲不徃何災也初用而剛變耦為竒尾也失四之應安得不危勿用有攸徃者言但守其柔不可用之而有所徃柔既不變上與四孚又何災焉六二執之用黄牛之革莫之勝説象曰執用黄牛固志也二柔得位利於守正執之也卦自姤來下體本巽用而為艮艮土居丑黄牛也柔來變剛革也心與五孚固志也莫之勝説者君臣交際不勝其喜也九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也三用而柔牽於上之應係遯也居位不當於卦為否上下不交有疾而危安得不憊惟當以剛自守下止二隂畜之以臣妾之道然後獲吉不可大事者剛不宜變也艮為閽寺臣妾之象凡言遯者皆剛變而徃也九四好遯君子吉小人否象曰君子好遯小人否也陽為君子四不用也下與初應中心相好所以為吉隂為小人用而柔也失初之應所以為否遯指初也九五嘉遯貞吉象曰嘉遯貞吉以正志也嘉昏禮也五剛二柔有孚于嘉之義守正不變志與之合何吉如之釋彖言剛當位而應此爻也遯指二也上九肥遯无不利象曰肥遯无不利无所疑也乾體剛健肥也上用而柔則肥遯矣於卦為咸居當其位順以從君何疑之有无不利者上與五皆利也乾下震上大壮利貞彖曰大壮大者壮也剛以動故壮大壮利貞大者正也正大而天地之情可見矣大壮自坤來以四為主未為大壮猶是泰體六四用之而剛乾剛震動剛以動故壮也陽為大主爻守貞不變大者正也守之以正則陽剛益大内卦乾外卦本坤乾一索於坤而得震由静而動大本於正也天地之情於此可見矣象曰雷在天上大壮君子以非禮弗履四陽為大壮時當中春雷乃發聲逺邇皆聞其壮可知先期而震則為小過君子浩然之氣剛大以直其動以天然後為壮苟非禮而履則猶雷之非時而震又何足以為壮乎初九壮于趾征凶有孚象曰壮于趾其孚窮也趾耦而在下初以剛居之壮于趾也用之而柔征也於位不當何能免凶上與四孚雖有其應然當大壮之初豈宜變剛為柔若必欲其孚則窮矣此浚恒所以貞凶也凡言壮者剛也明夷渙之馬壮夬之壮于頄皆變柔為剛也九二貞吉象曰九二之吉以中也二剛得中上應乎五守正不用所以吉也九三小人用壮君子用罔貞厲羝羊觸藩羸其角象曰小人用壮君子罔也三變剛為柔小人用壮也守剛不變君子用罔也貞者守剛為正也若不能守於卦為歸妹之征凶危也知其危則不變矣羝羊觸藩羸其角此形容小人用壮之状變乾為兊羊也變竒為耦角也四以剛居兊上為藩羊欲進而藩當其前是以羸角九四貞吉悔亡藩決不羸壮于大輿之輹象曰藩決不羸尚徃也四為大壮之主守貞則吉悔亡者不輕變也三用九則變乾為兊兊為羊四當其前為藩三但守其剛四用而柔藩雖決去无羊角之可羸矣然當四陽壮盛之時豈宜用而為柔尚徃者所貴復還其剛也坤為大輿輹者輪下之木變坤為震壮于大輿之輹也六五喪羊于易无悔象曰喪羊于易位不當也五互兊為羊變柔為剛喪羊也舍危即安于易也以柔居陽位本不當是以貴乎變也无悔者於卦為夬不可復還其柔也上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也上用而剛藩也五互兊為羊由下而進有觸藩之象藩為羊所觸反為柔而不及不能退也但為剛則无成不能遂也兩皆不能何利之有皆由自不詳審而輕於變所以致此艱則吉者惟當於艱難之中復還其柔斯可免咎當位有應何吉如之坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉自觀來以五為主方其為觀柔本在四進而居五所謂晉也離為日大明也下體坤上體離明出地上也下卦三隂同附乎五順而麗乎大明也柔進居五是謂上行晉之本體也柔雖居尊而下无其應必三隂俱變於卦為大有然後上下應之也康安也侯四也用變也錫予也馬蕃庶乾之三陽也四為大臣位既不當在所當變然變則為剥小人長矣故五之君安四之侯俾之勿變而使下三隂皆用為剛以從乎四則是四之侯得三剛以為之助者皆五以蕃庶之馬錫之也五居離明之中而孚其志於下之三剛焉故曰晝日三接鼎之變體也是以云者推言四不可變而下三爻可變也釋彖言柔進而上行者三晉與鼎睽皆用為大有也象曰明出地上晉君子以自昭明徳日之體本明雖入地中其明固存出乎地上其明益著非有二明也明徳者已之所固有特患人自晦之耳大學之道在明明徳自明也由脩身齊家以至治國平天下皆明徳之著見者也乾曰自强晉曰自昭皆自己求之也初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也初用而剛以從乎五晉如也與四相敵摧如也守剛為正貞吉也初先諸爻而變焉獨行也罔孚者戒其勿應乎四也安於其位不受四之命而麗乎君豈不綽綽然有餘裕哉何咎之有六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也二用而剛以應乎五晉如也為四所間愁如也守剛為正貞吉也五以柔居尊王母也二以剛居中實受其福上與五孚于其王母也介大也六三衆允悔亡象曰衆允之志上行也當晉之時五柔上行群隂之志皆欲變為剛以應之三亦為剛是謂衆允悔亡者不可復還其柔也釋彖所謂晝日三接者下三爻皆當變也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也四以剛居大臣之位上孚乎五晉如也若專權擅利貪而不顧鼫鼠也貞者守剛不變也位既不當又戒以勿變何也蓋變則於卦為剥何能免危為大臣而處權利之地戒之哉鼫與碩同互艮為鼠六五悔亡失得勿恤徃吉无不利象曰失得勿恤徃有慶也悔亡不可輕變也失者下三爻皆柔不應乎五也得者下三爻用為剛以應乎五也勿恤者君位離明天下利見失得在彼於五何憂徃者三柔既徃於卦為大有厥孚交如吉无不利彖言晝日三接正指此也上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也上用而柔變竒為耦有角之象於卦為豫利用行師有伐邑之象一剛五柔有師之義維可用之伐邑然於豫為㝠其道未光可謂危矣知其危而不變焉則明出地上吉又何咎守柔為貞不還其剛是之謂吝離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以䝉大難文王以之利艱貞晦其明也内難而能正其志箕子以之明夷自臨來以二為主離在坤下為明入地中明傷之象也内文明而外柔順離内坤外也䝉大難者二在互坎之下也三分天下有其二以服事殷囚於羑里文王之事也於艱難之中守正不變處明以晦文王之心也内難而能正其志指五而言紂不明厥徳失為君之道猶日没於地内難之象能正其志而不少變焉箕子也明夷一卦其當文王與紂之事邪象曰明入地中明夷君子以涖衆用晦而明日没於西入乎地中日生於東出乎地上入則必出晦則必明君子涖衆而用晦所以為用明之地坤為衆為晦離為明初九明夷于飛垂其翼君子于行三日不食有攸徃主人有言象曰君子于行義不食也内卦離為飛鳥初用而柔則垂其翼而不能飛矣復還其剛君子于行也離為日數三三日也三在互坎之中為酒食初不從三而食者柔有攸徃也主人指武王也此伯夷義不食周粟之事也離為言主人雖有言初之君子不暇顧也六二明夷夷于左股用拯馬壮吉象曰六二之吉順以則也二居限之下趾之上為股離為戈兵傷于左股也用之而剛上與五應以剛濟柔所謂用拯方其未用互坎為馬以剛易柔所謂馬壮於卦為泰得尚中行所以為吉順帝之則文王以之彖言利艱貞守柔不變文王自明其心也爻言用拯馬壮吉用柔為剛周公明時之當變也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也三居互坎之中坤當其前有師象坎居北坤西南有南狩象以剛居上為大首今乃上為柔而三為剛是其大首為三所得矣守貞不變隂不能害之不可疾也上體坤隂晦之極大明將升人心背昏而就明武王以之六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也坤為腹入于左腹四不用也以柔居隂雖為當位然明夷之君難與有為四為近臣蓋得其心意矣用之而剛變坤為震坤闔户也震動也户闔而動于出門庭也㣲子以肺附之親知紂之不可諌而去之也六五箕子之明夷利貞象曰箕子之貞明不可息也五君位也聖人不繫之紂而繫以箕子蓋為殷諱此變例也當殷之末世箕子為同姓之卿諌而不從自處於晦内難而能正其志也不可息者消其明也盡臣之道是為箕子之貞上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也明夷與晉反對晉明出地上明夷明入地中晉為明明夷為不明初登于天晉也後入于地明夷也此爻言紂不明厥徳誕罔顯于天也知文王以順則而興則知紂以失則而亡矣晉離日在上下坤西南互艮東北照四國也離下巽上家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣家人自兊來以二為主下兊以三之柔易二之剛而為離上兊以上之柔易四之剛而為巽下卦為内上卦為外六二以柔居隂女正位乎内也九五以剛居陽男正位乎外也利女貞主爻守正不宜變也天秉陽居上地秉隂居下天地大義不過如此家人有嚴君者五為父四為母父母一家之尊居上卦也父子夫婦皆指二五以尊卑言之也五為兄四為弟三為兄二為弟以大小言之也各順其序各盡其道而家道正正家而天下定為九五王假有家言之也象曰風自火出家人君子以言有物而行有恒内卦離外卦巽巽風自離火而出内明而外巽所以明人倫而風天下家人之象也離為言言發於内巽風有行之義行見於外二居離中有五之應言必顧行有物也四居巽下有初之應行之顧言有恒也言行相應而不相違脩身齊家之道也初九閑有家悔亡象曰閑有家志未變也離外堅中虚有家之象二為家人之主初以剛居其下得防閑之道謹其始也悔亡者當位有應何以變為若變為柔則防閑缺矣故象以志未變言之六二无攸遂在中饋貞吉象曰六二貞吉順以巽也婦人從夫者也故无遂事惟酒食是議婦人之事也二居離中互坎為酒食在中饋之象貞吉守正不變則吉也五居巽體二以柔順從之故曰順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也家人以九五為嚴父嗃嗃之象也悔變也三變剛為柔為嗃嗃而悔也悔而失位不能无厲而能同二四之柔上從乎五於卦為益安得不吉何失之有三若不用則以一剛䧟二柔之中无上之應而相比以為悦婦子嘻嘻之象也終於執吝而不知悔焉家節之失莫大於此六四富家大吉象曰富家大吉順在位也四以柔居隂母道也五以剛居陽父道也陽為富而隂比之富其家也五居尊位四能順從吉孰大焉九五王假有家勿恤吉象曰王假有家交相愛也剛居尊位下應乎二為王假有家假大也家二也家既齊矣推而大之天下之人莫不親其親子其子交相歡愛何憂之有其吉宜也上九有孚威如終吉象曰威如之吉反身之謂也家人以五為尊剛復居上家之相也用之而柔應三比五均曰有孚然家相之道以嚴為尚不宜為柔也但還其剛是謂威如復其本體反身之謂終於不變所以獲吉故既濟之濡其首厲者欲用為剛也兊下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉睽自巽來以三為主下巽以初之柔易三之剛而為兊上巽以四之柔易五之剛而為離離柔居五火動而上兊柔居三澤動而下火性炎上水性趨下火澤之睽也方其為巽巽長女上下皆巽二女同居也二柔相直无配合之理其志不同也下巽變兊上巽變離行也下兊上離以説麗明五柔得中進而上行下應乎剛睽之本體也是以小事吉者隂為小變為事柔居乎三為卦之主位既不當不容不變用之而剛於卦為大有柔得尊位大中而上下應之所以為吉睽之變體也天地男女萬物皆不外乎隂陽方其為睽則隂陽間隔及為大有則睽者合矣以天地言之天位乎上地二生火火性炎上所以同者以三之變也以男女言之二五相孚各得其志所以通者以三之變也以萬物言之大明當天萬物相見所以類者亦三之變也睽之時而得為大有者以其能用也凡卦之變大有者皆稱吉鼎元吉亨初用六也黄離元吉二用六也睽小事吉三用六也大畜童牛之牿元吉四用六也象曰上火下澤睽君子以同而異離兊皆隂卦而火炎上澤潤下同而異之象君子周而不比和而不同群而不黨蓋取諸此也初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也悔亡初不變也四在互坎之中為美脊之馬若用而柔則喪馬矣勿逐者初不可徃而為柔也自復者四當變剛為柔復其本位也四為睽之間是謂惡人今不為敵而為應初雖見之何咎之有九二遇主于巷无咎象曰遇主于巷未失道也二五相應為四所間未免委曲以通其情五君位主也離中虚巷也二以剛遇五之柔遇主于巷君臣同心不失其相與之道以此去間何咎之有六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也三居互離之中為輿為牛曳者乗二之剛後有所繋輿不得行掣者負四之剛前有所制牛不得進以其居不當位也五與三皆柔上與二皆剛頥之象也頥中有物當齧而去之五之厥宗噬膚同噬乎四也其人指四也天指上也所以為睽皆四之故人力雖不能加天且劓之矣四守剛不變則為睽之間无初也四變剛為柔則无睽之間有終也在上則為遇雨在三則為遇剛而三上相應矣九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也四與初不相應為孤用之而柔交孚乎初為遇元夫睽孤故危知其危則不還其剛何咎之有孚者四之志變而有應則志行矣六五悔亡厥宗噬膚徃何咎象曰厥宗噬膚徃有慶也悔亡者五與二應不可輕變也自二至上頥中有物之象厥宗指三也五與三為宗同噬乎四之膚齧而合之間者去矣四剛既徃上下皆應則不為睽何咎之有慶也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾徃遇雨則吉象曰遇雨之吉羣疑亡也上本與三應為不孤為四所間失三之應則孤矣豕與鬼指四也塗與車指三也四居互坎之中為豕下兊為澤豕在澤中故見其負塗坎北方幽隂鬼之所舍互離為車在坎之下有載鬼一車之象坎為弓弧也先張之弧四以剛敵上也後説之弧四變剛為柔也向非四為之冦則上與三婚媾矣徃遇雨則吉者四之冦既徃然後三上相親无有間之者三在兊澤之上雨也凡所以致睽之疑皆四之剛實為之四不為剛則羣疑皆亡是為遇雨之吉也艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南徃得中也不利東北其道窮也利見大人徃有功也當位貞吉以正邦也蹇之時用大矣哉蹇自震來以三為主下震以初之剛易三之柔而為艮上震以四之剛易五之柔而為坎所以為蹇者三也水在山上流行艱阻非蹇而何屯蹇皆謂之難者坎險俱當其前也艮在其後互離於中見險能止不䧟於險是之謂知蹇之本體也三用而柔於卦為比下卦變艮為坤利西南不利東北蹇之變體也為比則无三之間二五相應徃得中也為蹇則水勢趨下而山止之其道窮也以變體言之五為大人不寧方來上下皆應徃有功也以剛居陽守貞而吉萬國建而諸侯親以正邦也當蹇之時用而為比豈不大哉象曰山上有水蹇君子以反身脩徳山上有水澗谷之泉也土石礙之不能流行其象為蹇行有不得反求諸己君子見險而能止也反身取艮之背脩徳取坎之心初六徃蹇來譽象曰徃蹇來譽宜待也蹇之所以為蹇者以三也故諸爻皆欲去之初以柔孚乎五為三所間何能有譽徃蹇者宜待三徃而為柔則上比乎五為有譽矣六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也五為大人二為王臣處重坎之下故曰蹇蹇上應乎五志在乎君遑恤其躬雖捐軀犯難終无怨尤六二其忠臣哉九三徃蹇來反象曰徃蹇來反内喜之也三爻用九剛徃而柔來蹇體變矣於卦為比蹇自震來三本柔也今復為柔所謂反也内喜者下卦為内初二皆隂喜其引類以比於君也利西南不利東北指此爻也六四徃蹇來連象曰徃蹇來連當位實也四為大臣欲連羣隂以比乎君而下乗三之剛為其所間徃蹇者三剛既徃則衆柔皆比乎五是謂來連五以剛居中當位實也陽為實九五大蹇朋來象曰大蹇朋來以中節也五以剛居尊為大諸爻皆當從之三以剛為卦之蹇亦大也物莫能兩大必三用而柔則向之為蹇者皆同衆柔以宗乎剛故曰大蹇朋來於卦為比不寧方來一剛制衆柔也剛而得中故能節之五不變而言三變者彖所謂利見大人貞吉也凡五隂一陽之卦皆取朋來之義復曰朋來豫曰朋盍簮解變為師曰朋至斯孚其義同也上六徃蹇來碩吉利見大人象曰徃蹇來碩志在内也利見大人以從貴也上欲比五有三之應安能無疑徃蹇者必三徃而為柔則上下皆宗乎五之剛來碩也志在乎内安得不吉利見大人者言三既變則上但當守柔以比乎君是謂從貴若上復為剛則為比之後夫凶爻言徃蹇來碩者指三之變也又言利見大人者戒上之勿變也坎下震上解利西南无所徃其來復吉有攸徃夙吉彖曰解險以動動而免乎險解解利西南徃得衆也其來復吉乃得中也有攸徃夙吉徃有功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉解自艮來以二為主下艮以三之剛易二之柔而為坎上艮以上之剛易四之柔而為震下坎為險上震為動險以動者先險而後動也動而免乎險者動出乎險也動乎險中則為屯動乎險外則為解利西南者坤為西南為衆二用而柔變坎為坤於卦為豫利建侯行師徃得衆也无所徃者二不變也剛自三來為卦之主復也剛應乎五得中而吉解之本體也有攸徃者二既變也以柔居隂不失其初夙也隂宗乎四有功而吉解之變體也以本體言之坎為雨震為雷時當驚蟄雷雨作焉乾為木果震坎艮皆得乾之一陽故剥之上艮為碩果此卦之震坎為百果也震為草木為蕃鮮百果草木皆甲坼天地之解也故曰解之時大矣哉象曰雷雨作解君子以赦過宥罪雷行於未雨之先為屯雷動於既雨之後為解雷者天之威雨者天之澤威中有澤刑獄之有赦宥也過誤者赦而不問有罪者宥而從輕君子所以推廣天地之仁心也初六无咎象曰剛柔之際義无咎也初以柔居陽位本不當疑若有咎然上與四應剛柔交際理應免咎歸妹所謂吉相承者用為此爻也九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也二居地上為田三伏於坎之宂為狐二為解之主上與五應三以隂柔介乎其間必射而獲之則三變為剛狐去而矢得矣與射雉一矢亡之義同貞吉者二守剛為貞孚五之柔為得中道所以為吉未濟以三為狐亦居二坎之中也六三負且乗致冦至貞吝象曰負且乗亦可醜也自我致戎又誰咎也内卦坎上復互坎三以隂柔居二險之中為解之間上負四下乗二上下皆陽剛君子一小人處於其間豈不可醜與上相敵冦戎之至已實致之又将誰咎貞吝者守柔為正居既失位上又无應不知變焉吝也九四解而拇朋至斯孚象曰解而拇未當位也拇者足之大指謂初也初之柔本應乎四四以剛居隂於位未當又為二所間志欲合而足不隨汝之拇解矣必用而柔於卦為師九二以剛居中為師之主衆柔之朋俱至四乃得與初同孚乎二故師之六四曰師左次无咎者不可用而為解也六五君子維有解吉有孚于小人象曰君子有解小人退也五用而剛於卦為困履剛中之位以解天下之難維君子能之二自變為柔以孚乎五則小人退聽險難既平其吉宜也困之九五利用亨祀正指二之變也上六公用射隼于高墉之上獲之無不利象曰公用射隼以解悖也二五相應三介其間二指三為狐居坎穴也五指三為隼居離中也故二與五皆欲射而獲之五公也離中虚外堅墉也五在高墉之上變三之柔為剛悖者解矣是公用之也上既得應亦无不利兊下艮上損有孚元吉无咎可貞利有攸徃曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸徃曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行損自泰來以上為主方其為泰三剛上柔本自當位今乃損下之剛益上之柔雖曰其道上行而位俱不當所以為損然有五之柔能順乎上之剛損而有孚也君臣相得是以元吉何咎之有損之本體也上為卦主亦可守貞必變為臨居位乃當此上剛所以利於徃損之變體也曷之用者上既曰貞而又曰徃然則如之何其用之上苟不用則五用而剛可也於卦為中孚五在互震之上震為竹簋之象也五陽為實三四皆隂為虚虚以承實簋之用也剛柔交孚誠通意接可用享也為中孚則三四之柔皆從乎五二簋應有時也為損則三剛上柔易位而處損剛益柔有時也蓋三四之從五與損下而益上皆非常道故並以有時言之損而為柔益而為剛盈而為陽虚而為隂適時之宜與之偕行雖聖人不能違乎時也象曰山下有澤損君子以懲忿窒慾澤在山之下氣通山之上山潤則澤减損之義也兊説也有慾之象互坤其上静以制之於未然窒慾也互震動也有忿之象艮在其上止而戒之於已然懲忿也忿慾累徳故君子損之又損初九已事遄徃无咎酌損之象曰已事遄徃尚合志也已事者剛既變為柔也失位无應安能無咎遄徃者其柔速去復還為剛志與四合何咎之有酌損者參時之宜不可輕變也九二利貞征凶弗損益之象曰九二利貞中以為志也二與五應守正則利變則必凶弗損者言不可為柔益之者言但當為剛中以為志者言二五之心以中相與也六三三人行則損一人一人行則得其友象曰一人行三則疑也卦本泰泰自坤來三陽由下而升三人行也分三之剛以居上損一人也剛既上行五柔孚之得其友也上既得友不應乎三三位不當復乗乎剛何能免疑六四損其疾使遄有喜无咎象曰損其疾亦可喜也四用而剛於卦為睽間乎其中是謂惡人疾也欲損其疾必使速還其柔則相應而有喜矣何咎之有六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也五之柔本與二應或用而剛是益之也於卦為中孚具離之體離為龜兩龜為朋損益皆變為龜是朋也中孚三四之柔皆從乎五之剛二五為十十朋之龜也信由乎中龜卜恊從弗克違也五之心孚乎三四自上祐下所以元吉即信及豚魚之義也上九弗損益之无咎貞吉利有攸徃得臣无家象曰弗損益之大得志也弗損不用為柔也益之但為剛也剛為卦主有五之應大得志也无咎貞吉彖辭之義也利有攸徃剛徃柔來亦利也五柔上剛於理未順上用而柔不失其道故曰得臣无三之應志不在内故曰无家彖言可貞而繼以利有攸徃者此爻也震下巽上益利有攸徃利涉大川彖曰益損上益下民説无疆自上下下其道大光利有攸徃中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行益自否來以初為主剛本在四退而居初損乾之剛益坤之柔坤為民而在下為地而无疆民既得益其説可知陽為大為光以貴下賤為主於内其道大光也利有攸徃者指來卦言也方其為否上下不交變而為益則四柔得位上同乎五五剛中正然後有慶益之本體也利涉大川者二用而剛下震變兊互體仍震木道乃行於卦為中孚乘木舟虚益之變體也二非相易之爻而言變者何也蓋初為益之主在下而得民二本應五而乘初之剛不容不變故損益皆變中孚也以本體言之動以從乎上上巽以接乎下以剛易柔是之謂益一陽在下勢必浸長日進无疆也乾陽居初天氣下降坤隂居四地氣上騰天施地生也隂陽交際品物咸亨其益无方也時之當益雖天地不能違與時偕行也損兼損益而言而益獨言凡益之道者蓋能損上益下則但見其益矣象曰風雷益君子以見善則遷有過則改動萬物者莫疾乎雷撓萬物者莫疾乎風雷震於先風隨其後鼓之舞之生意不窮是之謂益陽自内生為善隂自内生為過卦本否以柔居初為不當位過也變否為益剛自外來而為主於内見善則遷也柔自内徃而得位乎外有過則改也雷以動之見善勇為風以散之改過不吝君子之所以益其徳者如此初九利用為大作元吉无咎象曰元吉无咎下不厚事也大陽也作動也卦本否剛自四來而居乎初利用為大作也當位而應為益之主吉又何咎下為初厚為坤事為變下不厚事言初不變為坤也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也二用而剛或益之也以剛易柔自外來也於卦為中孚十朋之龜與損同義永貞者守剛為正也雖不應乎五而無乘剛之疑所以為吉王用享于帝者復還其柔志不在初而在乎君五為王上為帝籲俊尊上帝所以吉也爻兩言吉用與不用皆可也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也三用而剛變震為離上復互離離為戈兵凶事也爻本有應用之則无應而凶何所歸咎理固然也復還其柔得中而行斯與五孚圭者達信於君也土主信互坤土也告公用圭者以朝覲㑹同之禮告之公也此爻變則為凶禮復其柔則為賓禮孚與不孚之間耳六四中行告公從利用為依遷國象曰告公從以益志也卦本否四之剛下而居初中行也當否之時上下不交而天下無邦既變為益六四大臣告于公上從民之志用初之剛建以為侯依其遷國下既獲益利莫大焉坤為國震為侯變坤為震遷國也以剛易柔民説無疆益志也九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我徳大得志也有孚惠心者五居心位四以柔順乎五也勿問元吉者自然相孚不勞告誡吉莫大焉彖言中正有慶此也有孚惠我徳者二以柔順乎五也君臣同心於上則下之人亦順承其君之徳而君之志得行矣上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也剛為益柔為損莫益之者不可守剛也或擊之者上守剛不變則柔自外來攻而變之也五居心位立心者以五為主上徃從之也剛柔相應為恒勿恒者上不可為剛以應乎三也失位求應安能免凶益者人之所欲而戒以莫益其辭雖偏然志在乎君其理則正也易通卷四
