body:
  text: 易通易類提要臣等謹案易通六卷宋趙以夫撰以夫字用父宋宗室子居于長樂登嘉定十年進士厯官資政殿學士閩書稱以夫著易通莆田黄績相與上下其論則是書實績所參定以夫自序皆自稱臣末有不敢自秘將以進于上庶幾仰禆聖學緝熈之萬一云云則擬進之本也胡一桂云易通六卷或問類例圖象朱彞尊經義考曰宋志十卷又注曰聚樂堂書目作六卷葢宋志連或問類例圖象言之聚樂堂本則惟有易通此本亦止六卷而無或問類例圖象其自靜樂堂本傳寫歟其書大旨在以不易變易二義明人事動靜之準故其説曰奇偶七八也交重九六也卦畫七八不易也爻畫九六變易也卦雖不易而中有變易是謂之亨爻雖變易而中有不易是謂之貞洪範占用二貞悔貞即靜也悔即動也故靜吉動凶則勿用動吉靜凶則不處動靜皆吉則隨遇而皆可動靜皆凶則無所逃于天地之間于聖人作易之旨可謂深切著明矣乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易通序易變易也而有所謂不易者存天地之大萬物之多要不過乎動静兩端而已一動一静造化之所以周流而无窮也卦六十四文王彖之首以元亨利貞之文爻三百八十四周公繫之緫以用九用六之說夫竒耦七八也交重九六也卦畫七八不易也爻書九六變易也卦雖不易而中有變易是之謂亨爻雖變易而中有不易是之謂貞聖人作易所以盡天地萬物之理而示人以趨吉避凶之方孰有外於亨貞者乎洪範占用二貞悔貞郎静也悔郎動也故静吉而動凶則勿用動吉而静凶則不處動静皆吉則隨遇而皆可動静皆凶則無所逃於天地之間此聖人所以樂天知命而不憂也臣幼學之年受易於師渉閲三紀猶憒如也辛丑居閒盡置傳註觀象玩辭豁然悟曰吾夫子之心其文王周公之心乎何所言無毫髪之殊也文王既沒文不在兹乎甚矣吾衰也乆矣吾不復夢見周公夫子之歎蓋歎易也又曰下學而上達知我者其天乎是當時群弟子已未足以知聖人矣臣生後夫子千七百餘載豈敢自異於儒先以為獨能探三聖人作易之㣲㫖第以參稽卦爻徃來俱通如是而亨貞如是而悔吝如是而吉凶无咎若象若數理無不合此臣所以自信其愚也丙午之夏書成名之曰易通不敢自祕将以進于上庶㡬仰禆聖學緝熈之萬一云臣以夫謹序
