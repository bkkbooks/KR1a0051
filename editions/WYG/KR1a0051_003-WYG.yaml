body:
  text: 易通卷三宋趙以夫撰震下離上噬嗑亨利用獄彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也噬嗑自否來以五為主凡卦皆以象人之身惟頥之六畫象口而噬嗑則象頥中有物也頥肖離中虚外堅獄也人之有罪麗于刑獄亦頥中之物也齧而合之故曰噬嗑亨者指來卦言也剛柔分者分五之剛以居初分初之柔以居五也動而明者動於内而明於外也合而章者雷以震之電以燭之威明並用也柔來居五得中上行位雖不當用獄則利尚仁與明也全卦雖象乎口以人身論之則初爻為趾而上爻為耳也象曰雷電噬嗑先王以明罰勑法雷電皆至豐又曰雷電噬嗑大象无重複亦无倒置者按石經作電雷噬嗑疑此文互也豐折獄致刑威明兩盡也噬嗑明罰勑法明於上以威乎下也轟轟熊熊天之動威不善者聞之而警君之用獄明示其罰勑正其法不善者見之而懼所以取噬嗑之義也明法離象勑法震象初九屨校滅趾无咎象曰屨校滅趾不行也卦本否初耦為趾剛自五來下居乎初為震之木加於其上屨校滅趾之象自失其應又將誰咎然四為噬嗑之間初又不宜為柔以應之不行者不變也邦無道求免於刑戮苟苟合焉則非君子矣六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也九四為頥中之物諸爻言噬者齧乎四也卦本否五為竒而在上鼻也易而為噬嗑剛來居初則五變竒為耦而鼻滅矣二噬四之否而上失五之應下乗初之剛安能免咎若用而剛則為之遇主于巷矣陽為膚隂為血六三噬腊肉遇毒小吝无咎象曰遇毒位不當也四互艮為黔喙之属腊肉也頥中有物指此也三以柔居陽於位不當不能齧而合之故遇其毒柔牽於位而不知變焉是謂小吝无所歸咎若用而剛則居當其位而无四之歸矣九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也胏肉之帶骨者四互坎為豕離日烜之乾胏也一剛貫乎衆柔之中得金矢之象以剛居四為頥之間上下皆欲齧而去之用之而柔於卦為頥始既失位變乃得當可謂艱矣守柔為貞則為顛頥之吉未光者不為陽也諸爻言噬噬乎四也而四亦言噬何也正猶履卦六三履四之剛九四為三所履皆言履虎尾義與此同六五噬乾肉得黄金貞厲无咎象曰貞厲無咎得當也乾肉亦指四也離為牛為日解牛而烜之以日乾肉也五用而剛於卦為无妄則无四之間矣黄中也金剛也得黄金者噬而得之也貞者守剛為正也不能守剛為四所間則危矣知其危而不還其柔則可无咎當位有應也上九何校滅耳凶象曰何校滅耳聦不明也上為首以離之木加之於首有罪者用械之象没其兩耳不能聽也五以柔居尊而上以剛臨之不畏其鄰安得不凶位既不當而昧於變通之道是謂不明趾與耳皆耦為竒則滅矣離下艮上賁亨小利有攸徃彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸徃天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁自泰來以二為主柔本在上降而居二柔來而文剛故亨亨者指來卦而言賁之本體也剛本在二升而居上分剛上而文柔故小利有攸徃隂為小二用六小徃則大來上與五應何利如之於卦為大畜賁之變體也方其為賁離自乾來及為大畜離復成乾乾天之上互震與兊日生於東朝彩煥發日没於西夜光陸離所謂天文者如此通晝夜之道知幽明之故時變之所由察也不變而但為賁離以麗之艮以止之君臣尊卑男女内外粲然有文禮為之節所謂人文者如此聖人嚮明而治天下之所由化成也天人皆有自然之文聖人觀象所以通變而神化也象曰山下有火賁君子以明庶政无敢折獄艮為山山下有火互震於中日將出之時也東方未明光華已爛賁之象也聖人南面聼政用其明也離為獄折獄非明不可而曰无敢者離明於内艮止於外所宜審克不可輕於用其明也剛柔得中所以為賁初九賁其趾舍車而徒象曰舍車而徒義弗乘也趾耦而在下以剛居之賁其趾也離為車艮為徑路初用而柔變離為艮舍車而徒也初剛四柔當位有應而爻言變何也盖四雖應初而乘三之剛於義未安不若初變為柔為艮其趾則各止其所而无咎矣六二賁其須象曰賁其須與上興也初為趾二反為須何也蓋五乃輔頰之位以柔居之須之象也二用而剛徃合乎五賁其須也動而得應與上興也彖言小利有攸徃此爻也壮于頄解而拇皆於應爻取義九三賁如濡如永貞吉象曰永貞之吉終莫之陵也三用而柔應上之剛剛柔相錯賁如也以柔變剛濡如也居失其位是為頥之貞凶永貞者以剛自守雖與上為敵而三當其位上終不得而陵之所以吉也易中言濡皆指隂爻六四賁如皤如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終无尤也四之柔應乎初之剛賁如也以柔居隂其質本白皤如也震為大塗於馬為􅑓足為的顙馳騁康荘如飛如翰白馬翰如之象四與初應婚媾也乘三之剛冦也若不為三所間則與初親也匪冦婚媾也居雖當位下乗乎剛未免可疑待三之變竟配乎初何尤之有此爻亦以不變言變則為離之哭如矣六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也二居地之上艮山震木之下丘園也五用而剛下應六二之柔陳菲幣帛以禮聘之賁于丘園也變艮為巽巽為䋲互離為絲下體復離束帛戔戔之象吝者不復還其柔也終吉者當位有應其喜宜也上九白賁无咎象曰白賁无咎上得志也卦本㤗隂為白剛上文柔白而賁之也雖無三之應而有五之孚其志得行何咎之有坤下艮上剥不利有攸往彖曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也剥自乾來以柔長之卦言之主當在五然卦五隂而一陽則一陽為之主矣故剥以上為主也乾純剛也柔之變剛從下而上姤遯否觀皆然至五隂則陽剛將盡故卦以剥名也一剛在五柔之上譬朝多小人而一君子尚居高位挽囘世變猶庶㡬焉若輕於引去則通國皆小人國非其國矣故曰不利有攸徃小人長也下坤順也小人之進其勢為順上艮止也君子屹然不動以止其進故曰順而止之觀象也然剥之極必至純隂一君子安能止衆小人之進聖人惓惓於君子所以為世道計也陽為盈變則虛矣消於剥之上息於復之下天道運行終則有始君子尚其變夫豈終窮於剥哉象曰山附於地剥上以厚下安宅山在地上何取乎剥高山其頺下附於地乃有剥象君居民上損己以益民下既厚則上安其居矣厚下坤也安宅艮也艮為門闕有宅之象初六剥牀以足蔑貞凶象曰剥牀以足以滅下也牀巽木也此卦无巽體而初二四三爻皆以牀言者卦本乾體隂剥於下而巽體已具故為牀也牀者安居之位牀既剥則當藉之以足足剛物也今乃不能蔑也是守正不變而凶矣以滅下者言无足也若用為頥則吉矣六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也辨牀簀也牀既剥則當藉之以辨辨剛物也今乃不能蔑也守正而凶與初同義未有與者上无應也若用為䝉則吉矣六三剥之无咎象曰剥之无咎失上下也剥自乾來以柔變剛自下而上故諸爻皆具巽體巽為牀初二四皆言剥牀而三獨不言牀何也盖三剥則下體為坤於卦為否上下不交則无牀之象矣剥而至此又復誰咎故象但以失上下言之六四剥牀以膚凶象曰剥牀以膚切近災也初在牀之下下剥則藉之以足二在牀之中中剥則藉之以辨四在牀之上上既剥矣顧以膚就之不凶何待四用而剛切近乎五君弱臣强災及其身矣晉九四鼫鼠此爻之變也六五貫魚以宫人寵无不利象曰以宫人寵終无尤也五用而剛於卦為觀中正以觀天下止終變為柔以從之魚隂物也宫人隂類也五以一剛居五柔之中有貫魚之象君位得當群隂順從以便嬖使令之道待之而不使與乎威福之柄以宫人寵也五既為剛上復為柔君剛臣柔兩盡其道无所不利何尤之有若上剛不變則為比之後夫凶矣上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也乾為木果艮之陽即乾之陽也果之碩大者不食則猶在木杪一陽在上之巽生生之意已寓於其中君子以一陽居羣隂之上為得輿坤為輿自五而下皆坤體也故曰民所載也艮為門闕廬之象也若用而柔變陽為隂則廬為小人剥矣豈安宅之道邪是以終不可用也震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸徃象曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸徃剛長也復其見天地之心乎復自坤來以初為主陽剥盡為坤坤純隂也陽無終窮之理窮則必復剛反於下所以為亨震動也坤順也動而以順循循而進莫之能遏變坤為復行也出入者隂出而陽入當位而安何疾之有朋來者五隂為朋皆宗乎初何咎之有乾六陽之卦也一隂生於下為姤二隂遯三隂否四隂觀五隂剥六隂坤反於下而復為陽自姤至復為七至所謂天行也自其為坤初爻隂也隂徃陽來然後為復剛長不已以至成乾何不利之有一陽天氣也動於地中生生之機實原於此故曰復其見天地之心乎象曰雷在地中復先王以至日閉闗商旅不行后不省方雷陽氣也陽氣濳萌於地中至隂肅肅生意已還故謂之復於時為冬至内卦震為足為大塗外卦坤為闔户為方坤在震上故至日閉闗商旅不行后不省方動以静養也初九不逺復无祇悔元吉象曰不逺之復以修身也卦本坤一剛始萌得其本位不逺之復也修身之道莫切於此當位有應不至於變无祇悔也衆隂朋來而宗乎初吉莫大焉六二休復吉象曰休復之吉以下仁也二用而剛於卦為臨一陽復於下為仁二亦為陽與初同徳可謂美矣徳不孤必有鄰安得不吉六三頻復厲无咎象曰頻復之厲義无咎也三用而剛是之謂復於卦為明夷志乃大得此爻也既變矣而又不變進退无常是之謂頻失位无應危也知其危而但守其剛揆之於理可以免咎六四中行獨復象曰中行獨復以從道也四居五柔之中用之而剛行也初四皆剛未免敵應一陽生於下為獨復四不宜變但守柔以從之所謂以從道也六五敦復无悔象曰敦復无悔中以自考也五用而剛下互艮體敦者坤變為艮厚而益厚也无悔者不必復還其柔也中以自考者威權已出下皆順從自成其功也於卦為屯大貞則凶而此爻乃變為剛何也盖當屯之時初以剛居下而得民五雖守剛而亦凶當復之時五為剛以居上初當為柔以從五則於卦為比矣上六迷復凶有災𤯝用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也上處隂之窮迷也用之而剛也迷而復也五以柔居尊上以剛臨之君柔臣剛是謂反道安得不凶天災人眚之必有者也用行師者卦一剛五柔皆具帥體復之主在初上又為剛是一師二主五之君不得制之必至大敗俱受其凶至于十年不克征者乆而无功也坤数十變艮為坤是為十年順以從初宜吉矣而曰不克征何也盖上逺于初兵難遥制與師之剛中而應不同也此爻變則為頥頥乃以吉言者蓋頥五上相易有尚賢之義此卦上變剛以臨五所以凶也震下乾上无妄元亨利貞匪正有眚不利有攸徃彖曰无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸徃无妄之徃何之矣天命不祐行矣哉无妄自遯來以初為主未為无妄猶是訟體剛本在二下而居初剛自外來而為主於内也下震上乾動而健也五與二孚剛中而應也初用而柔大亨也復還其剛以正也震之一陽即乾之剛天之命也元亨利貞指主爻也其匪正有眚指二也二以柔居隂上應乎五若不能守正而輕變焉於卦為履則災眚之來理所必至不利有攸徃者二不宜變也變則徃矣何之者徃即安之也五居天位五不我應是謂天命不祐其可行矣哉此以卦體言无妄也以人道言之剛自外來而為主于内天命之謂性也動而健率性之謂道也剛中而應陟降左右天且弗違也大亨以正動以天静以天也其匪正有眚福善禍淫天道也不利有攸徃安其天也无妄者誠也誠者天之道至誠不息與天同運不誠則妄動與天違其何以行之哉象曰天下雷行物與无妄先王以茂對時育萬物震雷一動勾萌甲拆時至氣應氣至物應无妄之義也大哉聖人之道洋洋乎發育萬物峻極于天天之生物不違乎時至誠賛化亦不違乎時聖人與天同一无妄也初九无妄徃吉象曰无妄之徃得志也无妄之初剛自外來而為主於内此爻也用之而柔志在乎君徃而得應何吉如之初為无妄之主兼亨貞二義六二不耕穫不菑畬則利有攸徃象曰不耕穫未富也二用而剛於卦為履居地之上為田田有耕穫菑畬之義陽為富耕穫菑畬所以為富者也復還其柔則剛利於徃為不耕獲不菑畬也隂雖未富然當位而應一循乎天理之自然為履道坦坦之吉矣六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也三與上應順乎天命无妄也用之而剛與上相敵災也變震為離離為牛指二言也互巽為䋲繫也三以剛繫二之柔在二為同人于野是行人之得也在三為伏戎于莽是邑人之災也言此爻亦不宜變也九四可貞无咎象曰可貞无咎固有之也四居乾體之下互艮之上雖失位无應而能安乎天不失為无妄也可之為言非終於守貞而不用也若用而柔於卦為益當位有應可以无咎理固然也九五无妄之疾勿藥有喜象曰无妄之藥不可試也五以剛居陽當位有應純乎天理至誠无妄也用之而柔乾體變則妄矣於卦為噬嗑頥中有物以為之間疾也疾則試之以藥藥所以還其剛也不變而全其本然之天則未嘗有疾何以藥為下與二孚有喜也上九无妄行有眚无攸利象曰无妄之行窮之災也上處无妄之純純乎天者也用之而柔於卦為隨上窮而下无應徃必有災无所利也乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大畜自大壯來以上為主未為大畜猶是需體剛居坎中所以為需剛居艮上所以能畜乾徳剛健艮徳篤實陽自五而進乎上其道光明輝光日新也剛本居五柔本居上今乃上為剛而五為柔忘勢尚賢君之徳也艮一剛止乾之健守剛為貞是為大正上與五孚志不在内不家食也君能養賢安得不吉利涉大川者一剛在震木兊澤之上乗木舟虚與頥中孚同上爻為天五以柔順之為應乎天剛柔交孚何向不濟易中五剛上柔相易者四卦大有鼎皆取尊天之義頥取尊賢之義惟大畜兼天與賢言之象曰天在山中大畜君子以多識前言徃行以畜其徳乾居下體其卦有八惟天在山中若无實象其義何取今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉蓋天秉陽萬物秉天之氣以生自出乎震陽氣發達歴四時而終乎艮歸根復命陽氣蓄藏積之也厚則其生也无窮天之氣藴於山中大有畜之也前聖之言徃哲之行多學而識之君子所以畜其徳也互震足兊口於中爻有言行畜徳之象初九有厲利己象曰有厲利己不犯災也初用而柔於卦為蠱上无其應可謂危矣危則有災必至之理利己者不如己之復還其剛自然无災蠱之初爻未免有厲用為大畜則終吉矣九二輿説輹象曰輿説輹中无尤也二用而柔於卦為賁互坎為輿多眚二在輿下説輹而不可行也若能乆中不失其應何尤之有賁小利有攸徃正欲變為大畜也九三良馬逐利艱貞曰閑輿衞利有攸徃象曰利有攸徃上合志也三居乾體為良馬變而從上有逐之象失位求應未見其可但當復還其剛然後得當守剛不變為利艱貞曰閑輿衞三不自變而告上曰上之剛利於徃而為柔變為坤輿閑習輿衛以從乎我則當位有應是上能變剛以合三之志也於三爻而言上變者蓋三用為損不若上用為泰也六四童牛之牿元吉象曰六四元吉有喜也四用而剛變艮為離離中一隂為牛指五言也暌之三其牛掣互離也无妄之三或繫之牛變震為離也牿閑牛之牢指四言也於卦為大有元吉也離畜牝牛吉亦用為大有也六五豶豕之牙吉象曰六五之吉有慶也五用而剛變艮為巽巽下一隂為豕指四言也姤之初為豕申孚之四為豚皆巽體也牙繫豕之杙也牿者閑之於後牙者繫之於前六畜之中馬屬陽牛豕屬隂童牛未角豶豕去勢畜之易者也如牿與牙有止之義焉四五相孚有喜有慶同乎吉也上九何天之衢亨象曰何天之衢道大行也上為天用之而柔艮山變為坤天地之衢也天本不可階而升今何為若衢然上爻亨故也上剛既徃是謂大行於卦為泰三陽自下而進賢者得路也彖但言貞爻乃言亨故加何字為發問之辭震下艮上頥貞吉觀頥自求口實彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉頥自坎來以初為主下坎以二之剛易初之柔而為震上坎以五之剛易上之柔而為艮貞吉初守正不變也初雖當位然震體居下易至於動艮止於上能養其正所以吉也二陽在外四隂居中外實中虛頥之象也凡隂皆求養於陽陽在上則能養人在下則為自養觀上九之所以養人觀頥也觀初九之所以養己自求口實也一陽在上天也一陽在初地也萬物非陽不養地承天之陽含𢎞光大品物咸亨也聖人五也賢上也五上相易尚賢之義互坤為衆萬民之象君能養賢然後萬民得其養天地之於物聖人之於民同此理也然養之道尤貴以時春生秋成冬裘夏葛天地聖人不能為也頥之大不曰義不曰用而曰時者有㫖哉象曰山下有雷頥君子以慎言語節飲食艮止于上震動于下頥之上止下動實似之雷動物也止乎山之下所以養其動也言語飲食取其動慎與節取其止出乎口者必慎所以養徳入乎口者必節所以養生君子法頥之象如此初九舍爾靈龜觀我朶頥㓙象曰觀我朶頥亦不足貴也頥卦肖離有龜之象靈龜伏息足以自養初用而柔於卦為剥舍爾靈龜也朶頥者張而在上也下剛既變失其自養之道而仰觀上九之朶頥人皆賤之矣失位无應宜其㓙也凡卦於本爻不變為我變則它爻為我而本爻反為爾矣與中孚九二之例同六二顛頥拂經于丘頥征凶象曰六二征凶行失類也陽所以養隂者也上為由頥衆隂皆由上而得養上雖非二應亦俯而養之所謂顛頥也以柔居隂經也以剛居隂是為拂經二用而剛則不受上之養上艮為丘所謂拂經于丘頥也征而必凶者行則失隂之類也損九二利貞者不宜過損也頥變為損而反凶者與上相違也義各不同六三拂頥貞凶十年勿用无攸利象曰十年勿用道大悖也上為頥之主三食上之徳乃以拂頥言何也三以柔居陽上以剛居隂皆不當位失養之道守柔為貞何能免凶道大悖者三不為剛於理逆也終於勿用必无所利十年言其久也互坤数十六四顛頥吉虎視耽耽其欲逐逐无咎象曰顛頥之吉上施光也二與四皆藉上之養皆曰顛而四以吉言者受上之施為獨光以柔居隂又有初之應與二不同也用之而剛互艮寅為虎離為目虎視耽耽也於卦為噬嗑頥中有物齧之使合有虎負嵎夫人皆思所以去之其欲逐逐也失位无應自取其災又将誰咎其欲指他爻也與觀其生其人天且劓之例同六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也卦本坎以剛居陽經也易而為頥以柔居陽是為拂經然柔得尊位剛上尚賢守柔為貞順以從上安得不吉不可渉大川者以非剛也上九由頥厲吉利渉大川象曰由頥厲吉大有慶也由頥者以剛居上衆隂皆由我而得養也用之而柔安得不危知其危而不變焉則吉矣陽為大君臣相得為大有慶也頥外堅中虗有舟之象利渉大川與中孚同以剛得衆何向不濟有渉川之義焉彖言養賢及民指此爻也巽下兊上大過棟橈利有攸往亨象曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉大過自離來以初為主下離以二之柔易初之剛而為㢲上離以五之柔易上之剛而為兊二隂四陽陽過於隂大者過也卦之全體取象於棟初為棟之本上為棟之末本末俱弱其橈可知初之剛過而居乎二上之剛過而居乎五二五皆中故曰剛過而中巽柔居下惟說之從以此而行何能有立大過之本體也利有攸往者初用而剛小者往矣於卦為夬何利如之乃亨者大過之變體也大過之時陽盛隂衰進而不已則為夬為乾豈不大哉象曰澤滅木大過君子以獨立不懼遯世无悶上兌下巽澤高於木大過之象君子臨患難而不奪何懼之有處阨窮而不憫何悶之有獨立不懼象木之植遯世无悶象澤之說初六藉用白茅无咎象曰藉用白茅柔在下也四剛在上棟也一柔在下彖所謂本弱者此也卦本離柔自二而居乎初藉用白茅也本弱必藉之以剛今乃用茅茅柔物也何足以藉其橈必矣无所歸咎茅巽下一隂也隂為白九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也楊澤木也為澤所浸則枯矣巽在兌下故取象焉二用而柔變巽為艮互體仍巽木生土中艮當丑寅之間生稊之時也稊者新生之芽蘖也老夫五也女妻二也老陽遇少隂雖過以相與而有生育之道猶枯楊而能生稊也无不利者於卦為咸當位有應二五皆利也九三棟橈凶象曰棟橈之凶不可以有輔也四陽為棟本末既弱三用而柔復中斷之非橈而何不可以有輔者言欲扶持之而不可是以凶也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也四陽為棟隆而不撓其吉可知有它者用之而柔亦猶三之中斷也以柔居隂雖為當位下无其應不能復還其剛吝也九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也五用而柔變兊為震互體仍兊木在澤上震當卯辰之間生華之時也老婦五也士夫二也老隂遇少陽既不可乆安有成實之理猶枯楊之生華也隂陽得配何咎之有老婦少夫何譽之有於卦為恒婦人吉夫子凶其可配哉上六過涉滅頂凶无咎象曰過涉之凶不可咎也卦本離剛居上為首頂也變離為兊兊為澤柔自五而進乎上是過涉而滅頂也以全卦之義論之為棟橈末弱宜其凶矣然而不可咎之者蓋當位有應順以從君猶愈於變而為姤之上窮也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚徃有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎自坤來以中為主坎險也上下皆險是之謂重八卦之中獨坎言習天一生水隂中函陽故坎為月魄受日光均四獸也而北為龜蛇均五蔵也而腎獨有二坎之本體也二五皆剛上下敵應變其一爻然後有孚陽爲盈五用而柔上坎既變水流而不盈矣下坎雖險不失其信行險而順也維心亨者五心位心既亨則孚乎下二乃得以剛中而上應也行有尚者五剛既往下配乎二於卦為師在師中吉所以有功坎之變體也以本體言之坎之在上者為天險有不可階而升之象坎之在下者為地險坎為水互艮為山有山川丘陵之象以變體言之坎為險坤為國二為王公師之丈人也總兵師以衛社禝有設險守國之義當險之時用而為師豈不大哉王公王者之公與王侯王臣同義象曰水洊至習坎君子以常徳行習教事源泉混混不舍晝夜水洊至也常徳行學不厭也習教事教不倦也皆於習上起義中爻互震艮震動艮止徳行常矣震為聲艮為言教事習矣初六習坎入于坎窞凶象曰習坎入坎失道凶也重險謂之習坎初居坎穴之下入于坎窞失位无應安得不凶若用而剛於卦為節則不出户庭无咎於道不失矣九二坎有險求小得象曰求小得未出中也二居險中上下敵應若五為柔以應之則二求小而得矣未出中者二剛得中可以勿變彖曰有孚維心亨即其義也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也三以柔居陽失位无應位之剛由下而進故曰來之坎坎險既在前退復㨿險故曰險且枕三乘二之剛居坎之穴故曰入于坎窞然而勿用者蓋二剛不變三以柔乘剛終於无功必二變為比而後可故三寕勿用而需二之變也六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也坎為水酒之象五竒居中也震為竹中虚簋之象三四皆耦也三四同比乎五以耦從竒剛柔交際一樽之酒而簋貳之也四用而剛於卦為困互離中虛缶與牖之象也下與初孚納約也為二所間故自牖以通其情雖不當位而終於无咎者以有與也牖非所由之正而室之所以受明也與遇主于巷之義同九五坎不盈祇既平无咎象曰坎不盈中未大也陽為盈為大坎不盈者五用而柔也中未大者不為陽也彖所謂維心亨者此爻也祇既平者但守其剛當位為安是之謂平二終變為柔以從之何咎之有既曰不盈而又曰平者言五變為師不若二變為比也上六係用徽纆寘于叢棘三嵗不得凶象曰上六失道凶三嵗也係用不變也徽纆叢􅁄刑獄之具坎爲法律故有此象係用徽纆牽於柔也寘于叢棘柔乘剛也上處重險之極下无其應是謂失道所以有凶三嵗者歴三爻也若用而為渙則逺害矣離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離自乾來以中為主離麗也一隂附乎二陽之間曰麗五居天位離之在上者為日月麗乎天之象月為日光故兼言之二居地位離之在下者為百榖草木麗乎土之象二互巽百榖草木也離納已土也五君位也居上離之中為重明守柔不變為麗乎正以明繼明恭己面南無為而治乃化成天下離之本體也然二五之柔皆麗中正上下敵應則二不容於不變故亨者下體變離為乾於卦為大有一隂畜於五陽之中離為牝牛也大畜六四童牛之牿亦為大有其義則同離之變體也它卦多言亨利貞而此卦獨言利貞亨者盖取卦之變體而非以來卦言也象曰明兩作離大人以繼明照于四方天无二日明兩作者今日復明日也人君以後明繼前明尊居人上光被四表猶大明當天无逺不照也凡卦以九五為大人離六五亦為大人者蓋自乾來也初九履錯然敬之无咎象曰履錯之敬以辟咎也初居卦之下為足錯鑪也離為戈兵履錯之象懼傷其足若履錯然用之而柔變離為艮艮止也止而敬謹斯可免咎若旅之初用而為離則以𤨏𤨏取災矣六二黄離元吉象曰黄離元吉得中道也二用而剛於卦為大有上與五應剛柔相孚為得中道以麗乎君所以元吉黄中也九三日􅉴之離不鼓缶而歌則大耊之嗟凶象曰日􅉴之離何可乆也三用而柔下明既終是為日􅉴之離居位不當何可以乆離中虚為缶鼓缶而歌指本體言也三變則互艮為終下震為聲大耊之嗟也於卦為噬嗑之遇毒安得不凶日之夕矣不能自樂以安其天徒自嗟耳我有鐘鼓弗鼓弗考其是之謂歟九四突如其來如焚如死如棄如象曰突如其來如无所容也五以柔居尊四以剛迫之突如其來如也處此危地将何所容君位離明臣弗自戢焚如也失位死如也无與棄如也下互巽為木在二火之間火出木燼焚如死如棄如之象六五出涕沱若戚嗟若吉象曰六五之吉離王公也離為目互兊為澤出涕沱若也兊為口戚嗟若也同人以无應為號咷得應為笑此爻變則為同人而爻无變辭何也蓋人主嗣位之初承考繼業且悲且憂豈以得位為樂但當守柔恭黙而已六二之臣終變為剛以從之於卦爲大有所以吉也二爲王公同衆剛以從乎五五居尊位托於王公之上柔麗乎剛也上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也五柔居尊王也上以剛臨之有負固不服之象用之而柔則剛動而徃是王用之也上為首變竒為耦折其首也既不爲首則當位而應有嘉也醜類也上不為柔匪五之類也變則獲之矣變離為震震為侯國安於為柔以正邦也凡易中言出言征皆取變義易通卷三
