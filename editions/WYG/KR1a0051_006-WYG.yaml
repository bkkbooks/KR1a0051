body:
  text: 易通卷六宋趙以夫撰離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則􅉴月盈則食天地盈虚與時消息而况於人乎况於鬼神乎豐自泰來以二為主二四相易所以為亨泰極而豐是之謂大離明也震動也明以動者如日之升輝光發越豐之本體也王五也假大也五以柔居尊而四以剛迫之安能無憂五用而剛所尚者大則勿憂矣離為日二居離中五與之應宜日中也三四五互乾為天日躔行天照臨下土豐之變體也以本體言之天下之理盛必有衰離為日中互兊為西􅉴之象也互巽為月㡬望食之象也上本坤下本乾剛柔相推盈者消而虚者息不能違乎時也震一陽生於下明則為人也巽一隂生於下幽則為鬼神也隂陽消長相為始終如環无端聖人於豐卦發明天地之大運而斷以勿憂宜日中之一辭其意深矣象曰雷電皆至豐君子以折獄致刑萬物出乎震相見乎離自春至夏豐之時也雷電皆至雨澤隨之槁者蘇仆者起長茂繁滋豐之象也離中虚獄也震為殺刑也明在内折獄而得中也威在外致刑而不用也獄无遁情則民莫敢犯而刑錯矣此治世之所以為豐也初九遇其配主雖旬无咎徃有尚象曰雖旬无咎過旬災也初用而柔於卦為小過上與四合遇其配主也旬均也下艮上震其数皆七旬也其數雖均而得无咎者徃而有應也若不用而但為剛下離數八上震數七是為過旬兩剛相敵安得不災小過飛鳥以凶變為此爻也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也卦本泰二之剛往而居四兩爻皆言豐其蔀者下離為日四以剛蔽其上也震數七斗之象下離上震日中見斗也往指來卦而言二五不孚故得疑疾五用而剛下孚乎二則宜日中而不見斗矣信以發志者以五之信發二之志其言宜也九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也三用而柔離體既變於卦為震中互坎雨豐其沛也日中而雨不見日而見沬沬者言被面如靧也不可大事者言陽不宜變也三本互巽為手用則折其右肱失位无應又将誰咎是以終不可用也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四之義與二同以剛居隂下蔽離日幽不明也用之而柔與初相應遇其夷主也自下遇上曰配自上遇下曰夷當位有應安得不吉行者剛往也變震為坤則不見斗矣六五來章有慶譽吉象曰六五之吉有慶也五用而剛下與二應剛柔相文是謂來章於卦為革文明以説有慶有譽其吉宜也上六豐其屋蔀其家闚其户閴其无人三嵗不覿凶象曰豐其屋天際翔也闚其户閴其无人自藏也上用而剛於卦為重離離中虚屋與家之象上離為屋下離為家當豐之極以剛居上亢然自大豐其屋也三既為剛上復為剛以窒之蔀其家也以上視下闚其户也失三之應閴其无人也三本應上而上乃輕於變焉自為閉藏閲三嵗之乆終於不覿其凶可知歴三爻三嵗也上爻為天離為飛鳥天際翔也艮下離上旅小亨旅貞吉彖曰柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅自否來以五為主柔自三而進乎五在外卦之中於位未當何能乆居既順乎剛亦将變離為乾小者亨也於卦為遯下應乎二旅之變體也艮止於下離明於上三守正不變以麗乎五旅之本體也五亨三貞皆可獲吉是以云者合二體而言之也旅者違其國去其家而託身於它人者也或行或止各惟其時此旅之時義所以為大不寜惟是凡寄形於天地之間者莫非旅也象曰山上有火旅君子以明慎用刑而不留獄山上有火日也互兊為西日薄西山明不可乆旅之義也百姓有罪麗于囹圄君子用刑惟明惟謹明則無遁形謹則無濫罰明謹既進斷决隨之聖人取象於旅正恐其留獄也刑既用則獄不留矣明取離慎取艮不留取旅之義初六旅𤨏𤨏斯其所取災象曰旅𤨏𤨏志窮災也初用而剛居卦之下上無其應旅之卑困而不得志者也詩曰𤨏兮尾兮流離之子是也爻本有應變而遂窮災患之來乃其自取六二旅即次懐其資得童僕貞象曰得童僕貞終无尤也次行者之所舍二以柔居隂安於其位旅即次也然上无其應以柔隨二剛之後未見其可用之而剛於卦為鼎陽為富懐其資也初以柔從之貴能役賤得童僕也位雖不當何尤之有故鼎九二之象亦以終无尤言之九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也三以剛居陽於位為當旅之次也初二皆柔童僕也三用而柔則次焚而童僕喪是可傷也貞者守剛為正也不能守剛則失位而危矣盖當旅之時但當止而麗乎明顧乃下與二柔為比以理言之其喪宜也三互巽在離之下以木巽火巽體變則焚矣九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也旅于處不變也陽為富資也剛能斷斧也當旅之時四以剛居隂於位未得上迫乎五五之心是以不快必四變為艮之止諸躬然後可以无咎五為主爻故曰我心六五射雉一矢亡終以譽命象曰終以譽命上逮也離雉也中剛矢也五用而剛離體既變射一矢而雉亡之象也五剛二柔當位而應自上逮下終以譽命也彖言旅小亨此爻也諸爻皆言旅五君位不可以旅言也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也離為鳥於木為科上槁巢也火自巽木而出焚其巢則離體變矣盖旅人在高位處非其據於義當變旅之先為否上雖失位猶有三之應是以笑否之後為旅既失三之應復以剛臨五是以號咷故戒之曰喪牛于易凶喪牛者變離也于易者即安也舍其利而安是圖也彼旅人者貪得而不知喪處險而不求易雖加告戒若罔聞知其凶宜哉巽下巽上巽小亨利有攸徃利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸徃利見大人巽自乾來以初為主上下皆巽是之謂重柔在其下剛能令之是之謂命申取重義二五皆剛巽乎中位守正不變其志得行者初為柔以順乎二四為柔以順乎五巽之本體也然上下皆柔未免敵應是以小亨者初用而剛於卦為小畜柔既往矣當位有應故曰利有攸徃四比乎五有孚攣如故曰利見大人巽之變體也象曰隨風巽君子以申命行事風者天之號令前倡後和相隨而至巽之象也人君将以行其政事於四方故命令之出必諄複申述然後天下信而從之巽之義也觀之設教渙之大號姤之施命亦然初六進退利武人之貞象曰進退志疑也利武人之貞志治也初用而剛又欲不用柔不能決已進復退其心疑也利武人之貞守剛為正也當位有應心與四孚志治也彖言小亨此爻也九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也巽為木牀也牀者人之所安也二以剛居隂於位不當失其所安有在牀下之象上巽為神史巫所以事神者也二用而柔以柔道接乎五用史巫也剛柔交錯紛若也得中而應吉又何咎九三頻巽吝象曰頻巽之吝志窮也三用而柔巽之義也於卦為渙志在外此爻也既變矣而又不變進退无常是之謂頻徒安其位而不知求應所以為吝兩剛相直安得不窮六四悔亡田獲三品象曰田獲三品有功也四以柔居隂為當位悔亡者不可輕變也初在地之位為田初變為剛以從乎四田而獲禽也竒數三三品也於卦為小畜柔得位而上下應之宜有功也於此爻而言初變者正彖之義也九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也五居天位守正在中悔亡不輕變也无不利者上巽宜正下巽宜變也无初有終者未變則上下敵應既變則剛柔皆孚也震納庚初爻庚子二爻庚寅三爻庚辰先庚三日也下體未變震伏於巽之下故曰无初下體既變則反巽為震後庚三日故曰有終於卦為益則勿問元吉矣上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也上以剛居隂於位不當失其所安巽在牀下與二同也陽為富資也剛能斷斧也當巽之窮所當用之而柔喪其資斧則當位有應為井之有孚元吉其可守剛而不變乎其凶宜也兊下兊下兊亨利貞彖曰兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉兊自乾來亨也以上為主二五以剛居中三上以柔居外柔皆比剛為說三上皆不變為利貞兊之本體也然上下皆柔未免敵應故變必其來卦之一爻然後卦有其主上用而剛變兊為乾上天位三人位三以柔順乎上上以剛應乎三上順天而下應人兊之變體也以本體言之兊之在上者為君兊之在下者為民以佚道使民雖勞不怨民忘其勞也以生道殺民雖死不怨殺者民忘其死也說道之大至此民不期勸而自勸矣彖辭不言變文王自明其心也夫子釋彖乃繋以是以之辭明卦之變體者盖言武王卒文王之功也又申以先民犯難之義明卦之本體者盖言文王顯于西土經始勿亟庶民子來王赫斯怒爰整其旅人心歸之可以王矣猶終其身事殷而不變此周之所以為盛徳歟象曰麗澤兊君子以朋友講習二澤相麗日漸月潤有相資益之義學而時習之不亦悦乎有朋自逺方來不亦樂乎兊為口兩兑胥説有講習之象初九和兊吉象曰和兊之吉行未疑也初用而柔上與四應以和為説行而得吉又何疑焉九二孚兊吉悔亡象曰孚兊之吉信志也二用而柔上與五應相孚以心何吉如之悔亡者當位有應不可復還為剛也六三來兊凶象曰來兊之凶位不當也三以柔居陽於位不當上无其應安得不凶來兊者兊自乾來也若變為夬則為君子夬夬之无咎矣九四商兊未寧介疾有喜象曰九四之喜有慶也商者度其可用與不可用四居二兊之間互巽為不果欲不用而但為兊又欲用而為節所以未寧疾者失位无應也喜者得位有應也疾與喜一介之分疾徃則喜來上與五孚有慶宜也九五孚于剥有厲象曰孚於剥位正當也孚者剛柔相應也剥者柔變剛也五以剛居陽於位為當守正不變則二當變柔以從乎五故曰孚于剥若五不能守正用之而柔以從乎二則失位而危矣有厲戒辭也上六引兊象曰上六引兊未光也柔道牽為引上為主爻守柔不變彖言利貞者此也為隂則未光變則於卦為履元吉在上其道光矣而爻不言變者明文王之心也坎下巽上渙亨王假有廟利渉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也渙自否來以二為主二四相易所以為亨否則窮矣剛來居二不窮也四以柔居隂得位乎外上比乎五王五也假大也上巽為風神也互艮為門闕廟也王者既大立宗廟以安祖考四之大臣相予肆視然後入于太室親行祼禮故曰乃在申也震木得風行乎水上利涉大川也五在互震之上與四相孚共濟險難乘木有功也利貞指五而言萃之假廟取其一人心之天渙之假廟取其開人心之天象曰風行水上渙先王以亨于帝立廟方其為否閉塞成冬巽為風坎為水風自艮方而來水泉浮動凍結融解渙之義也上下不交天理湮晦亨否而渙人心開明亨于上帝配以祖考尊尊而親親誰獨无是心哉先王所以示化天下則凡顓蒙而蔽固者皆渙然氷釋矣上爻為天帝也互艮廟也五君位介乎二者之間亨帝立廟也初六用拯馬壯吉象曰初六之吉順也初用而剛上與四應以剛濟柔用拯也方其未用下坎為馬以剛易柔馬壯也當位有應是之謂順所以獲吉九二渙奔其机悔亡象曰渙奔其机得願也二用而柔於卦為觀五居巽木之中王者憑几之象二趨而應之奔其机也悔亡者當位有應既得所願不可復還為剛也六三渙其躬无悔象曰渙其躬志在外也三用而剛失上之應不與五孚惟知有己躬之謂也復還其柔與五相孚志在乎外去其有己之私渙其躬也无悔者雖不當位不可輕變變則為巽之志窮矣六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也四用而剛變巽為乾三陽為羣雖有初之應然於位不當復還其柔渙其羣也上同乎五是以元吉光大者指五言也五互艮為丘故曰渙有丘志不在初故曰匪夷所思九五渙汗其大號渙王居无咎象曰王居无咎正位也巽為風為號令五在巽體之中陽為大大號也用之而柔㪚其號令於四方所謂渙汗也令出惟行不惟反猶膚之有汗也與二相應則令孚于下矣復還其剛居尊守正王乃在中百神爾主矣何咎之有卦辭所謂王假有廟此爻也上九渙其血去逖出无咎象曰渙其血逺害也上用而柔變巽為坎隂為血失道而凶安能無咎復還其剛渙出血也去逺出險何咎之有故象以逺害言之兊下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民節自泰來以五為主柔本在五分而居三剛本在三分而居五五剛居尊四柔比之亨而得中節之本體也苦節指三言也柔來居三失位无應其道既窮是之謂苦不可貞者三不宜守柔為正也用而為需則不窮矣節之變體也以本體言之下兊為説上坎為險說以行險節之義也九五之君為節之主當位以節也居中守正有孚攣如中正以通也陽自乾徃隂自坤來中互震艮萬物出震成艮天地節而四時成也損三之剛以益乎五損下益上宜若傷財而害民然五剛得中取民有制節以制度也上之取民中而不過民之奉上説而順從不傷財不害民也象曰澤上有水節君子以制數度議徳行澤上有水易至泛溢艮山在中以為之防節之象也卦本泰損三益五乃以節名何也世當泰盛之餘取諸下以奉上者易至無藝故賢君立為中正之法俾萬民惟正之供什一以定供賦九式以均財用動守法度惟恐有過徳失行則為傷財害民矣内以謀度諸心外以咨訪諸人皆議也上坎互艮制數度也下兊互震議徳行也初九不出户庭无咎象曰不出户庭知通塞也三四五互艮為門闕初與二皆位艮之下初守剛不變不出户庭也知通塞者不變則有應為通變則无應為塞初知此理而不變焉是以無咎九二不出門庭凶象曰不出門庭失時極也二在艮闕之下守剛不變不出門庭也无五之應又不當位失時而窮安得不凶六三不節若則嗟若无咎象曰不節之嗟又誰咎也三用而剛於卦為需節若與上相應剛柔節也不節若不用也居不當位又無其應徒然自嗟又將誰咎兊為口嗟之象也六四安節亨象曰安節之亨承上道也卦本泰亨而為節剛自三而居乎五四以柔比之守而不變安其節之亨也雖與初應志舍乎下以從乎君故曰承上道也九五甘節吉徃有尚象曰甘節之吉居位中也五剛當位近於四符甘節之吉也卦本泰剛來居五行而得配徃有尚也釋彖所謂當位以節中正以通者此爻也上六苦節貞凶悔亡象曰苦節貞凶其道窮也卦本泰三五相易而為節五與四孚是之謂甘三无上應是之謂苦豈惟三哉上无三應其道亦窮苦則一也守正必凶而又戒以悔亡者上柔當位不可輕變也三既失位所宜變剛以應上也於此爻而言悔亡盖上變為中孚不若三變為需也兊下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在内而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虚也中孚以利貞乃應乎天也中孚自離來以三為主下離以二之柔易三之剛而為兊上離以五之柔易四之剛而為巽二柔皆在剛之内二剛皆得位之中下説以順乎五上巽以應乎三信由乎中是之謂孚三四互震為諸侯五以君臨之乃化邦也巽下一隂為豚兊上一隂為魚五以陽感之信及豚魚也隂受陽施安得不吉震木巽風行乎兊澤外堅中虚有舟之象五乘其上涉大川也共濟險難何所不利三為主爻守柔不變與四同心以從乎五五為天位乃應乎天也損變中孚則二簋可用亨井變習坎則王明並受其福皆以三四之柔從五之剛故也象曰澤上有風中孚君子以議獄緩死澤上有風風入乎水風㣲則波生風厲則浪作有感斯應中孚之義也兊為正秋風自西起肅殺之氣也故司冦為秋官巽為號令兊為澤當用刑之時而有施澤之令議獄緩死也獄成而孚輸而孚求以盡人之心而使之无憾也兊為口議也巽為不果緩也初九虞吉有它不燕象曰初九虞吉志未變也虞者安樂之謂初處於下當位有應安而不變何吉如之有它則用之而柔於卦為渙失四之應其能安乎知其不可變故象以志未變言之虞燕皆取兊說之義九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也五互艮一陽在二隂之上艮為黔喙鳴鶴也二用而柔上應乎五其子和之者陽倡而隂和也我五也爾二也君臣相孚天位天禄與賢者共中心願者五以誠感乎二也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也三用而剛與上為敵或鼓而前用也或罷而止不用也或泣而悲用而无應也或歌而喜不用而有應也位既不當則可以變而彖言利貞何也全卦之義三與五孚守正則利應乎天也逐爻之義三與上應位俱不當所以小畜用為此爻則夫妻反目也六四月㡬望馬匹亡无咎象曰馬匹亡絶類上也巽納辛為生魄月㡬望巽不用也用則為乾矣馬乾剛也匹儔類也馬匹亡者不用為剛絶其類也但守其柔上與五孚何咎之有九五有孚攣如无咎象曰有孚攣如位正當也此爻與小畜皆以五孚四上體巽為手為繩故爻辭皆曰攣如攣者親宻而固結之義居位守正既得其當又與四孚何咎之有上九翰音登于天貞凶象曰翰音登于天何可長也巽為雞上居中孚之極故曰翰音登于天雖下與三應然居失其位猶雞雖能鳴安能登于天也信不由中何可以乆不變必凶變為柔以孚乎五可也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過自坎來以三為主下坎以二之剛易三之柔而為艮上坎以五之剛易四之柔而為震二剛在柔之内二柔得位之中柔過乎剛小者過而亨也利貞者三為主爻利於守正也來卦二為剛而三為柔今柔來居二剛徃居三各當其位與時偕行也柔得中指五也可小事者五之柔可變為剛則於卦為咸是以吉也剛失位而不中指四也不可大事者盖五已為剛若四之剛復變為柔則於卦為蹇是以不可也飛鳥之象二陽為腹四隂為翼上震為聲下艮為黔喙鳥飛而遺之音陽倡則隂和倡者在上和者在下於勢為順反是則逆矣聖人取此象以明二五之變不變五以柔居陽為逆不宜乎上故當變二以柔居隂為順宜乎下故不當變五剛二柔上下交孚吉孰大焉象曰山下有雷小過君子以行過乎恭喪過乎哀用過乎儉雷之發聲當在仲春大壯四陽之卦乃其時也今山上有雷在艮震之交先驚蟄而發故曰小過歴法卦氣小過在立春候行以恭為主喪以哀為主用以儉為主三者惟恐其不及雖㣲有過焉不害也上震為足行也互巽恭也萬物終乎艮喪也震為號哀也巽為利市用也艮為止儉也初六飛鳥以凶象曰飛鳥以凶不可如何也小過六畫有鳥衡飛之象四隂為左右翼初變則又翼不可飛矣以用也用之則凶如之何而可也六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也卦本坎坎以乾為父則乾於小過為祖也二用而剛互三四為乾過其祖也妣者祖之配指五也於卦為恒隂上陽下其理則逆大過九五亦變為恒而曰老婦士夫之可醜也故二但當守其柔在五則可變為剛以應之是二不及其君而五遇其臣也於卦為咸陽上隂下其理則順大過九二亦變為咸而曰老夫女妻之相與也君柔臣剛是謂過之臣柔君剛是謂不及臣承君者也不敢過焉何咎之有彖言不宜上宜下正謂此也九三弗過防之從或戕之凶象曰從或戕之凶如何也弗過者不為隂也防之者防隂之為害也若用而柔以從乎四之剛則三上皆柔必至相敵上當位而三失位則三為上所勝凶所必至其如之何九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也卦本坎四以柔居隂本自當位易而為小過以剛居隂上迫乎五又復誰咎弗過者不為隂也遇之者與初遇也位既不當宜往而為柔也所以宜徃者五柔四剛未免有危必當戒也不可長者不宜乆為剛也勿用永貞者不可守剛以正也彖言剛失位而不中是以不可大事而爻乃言變何也盖彖先言五之變既變為咸則四不宜復變爻言必變者五但為柔則四不宜為剛也六五宻雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也卦本坎五居天位坎水在上无不雨之理易而為小過下坎變艮上坎變震三四五互兊澤氣雖升有密雲之象然而不雨者互巽之風自兊方而來吹使離之也已上者隂先於陽是以不雨也自我西郊者兊為西五在互兊之上也用之而剛下應乎二二處艮山之中有穴居之象自公取之猶弋者之獲禽是聘巖穴之賢以為用而後澤及於下也彖言可小事此爻也自我西郊與小畜義同以柔居五而不敢為剛者文王之心也以剛變柔於卦為咸感人心而天下和平者武王之事也周公繫辭所以兩存其義也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也上用而剛弗與三遇是為過之於象為飛鳥之左翼變則不可飛矣變震為離離麗也不惟不可飛又離于罔以剛居上下无其應已亢而凶天災人眚之畢至者也於卦為旅故旅之上亦曰鳥焚其巢者當變為小過也離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也既濟自泰來以二為主二五相易亨也二守柔不變小利貞也彖但言亨而釋彖言小者亨何也盖柔本居五下而居二為卦之主也彖但言小利貞而釋彖兼言剛柔何也盖已為既濟則剛柔各當其位皆宜守正也此變例以發明彖辭未盡之㫖也初吉者二得中而應也終亂者上但為柔止而不變配三乘五其道則窮所以亂也象曰水在火上既濟君子以思患而豫防之水潤下火炎上今水在火上坎離交闕為既濟也天下不能无患當闕患離火在下患也而互坎之水防闕在中患也而上坎之水防之中爻復互離闕之象焉豫之義也坎離之中皆為心思之義初九曵其輪濡其尾无咎象曰曳其輪義无咎也離為車剛在其下輪也初為竒尾也用之而柔則輪曳而尾濡矣變則失位无應自取其咎理固然也六二婦喪其茀勿逐七日得象曰七日得以中道也離為車為中女茀所以蔽車者也五下應二以陽蔽隂茀之義也二用而剛變離為乾失五之應是為婦喪其茀復還其柔七日而得本爻是為勿逐七日得彖言初吉柔得中者此爻也九三高宗伐鬼方三年克之小人勿用象曰三年克之憊也三以剛居陽本與上應用之而柔反闕坎位乎北幽隂之地上在坎之外鬼方也五君位高宗也三承五之命代夷狄之小國至三年之乆求以勝之可謂勞矣當既濟之時中國盛强小夷在外不治可也變而為闕高宗伐鬼方之事豈有屯闕而能制夷狄於外者乎勿闕可變為隂也三年歴三爻也六四繻有衣袽終日戒象曰終日戒有所疑也繻者繒闕也衣袽者繒闕剛柔相文繻也初本應四衣之舊者也故曰繻有衣袽為三所間未免有疑既有所疑是以當戒舎初孚五則三不得而間之四居互離之中離體不變終日之象離為絲繻之象九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也五用而柔於卦為明夷明夷之君紂也既濟之君文王也變則坤為牛用大牲之象也不變則坎為水薦明水之象也殺牛至豐禴祭至薄紂之殺牛不如文王之禴祭殷東而周西也天已厭殷牲牷肥腯惟曰不亨帝方眷周潢汙行潦闕神曰實曰大曰福曰吉皆指坎中之陽也皇天無親惟徳是輔不在物也易之興也其當殷之末世周之盛徳邪上六濡其首厲象曰濡其首厲何可乆也闕坎下離上未濟亨小狐汔濟濡其尾无攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也未濟自否來以五為主二之柔進而居五得中而應所以為亨小狐指三也三處二坎闕狐在下坎之上汔可以濟互坎當其前未能出闕而濟險也尾指初也初在坎下為濡其尾既不克濟何利之有上爻為終若以初之柔續於上剛之後於卦為既濟則利矣今乃不然不續終也二以剛居陰五以柔居陽位雖不當而有其應是坎離不交之中有不能不交者存處未濟之時未闕不可濟之理易道之无終窮也如此哉象曰火在水上未濟君子以慎辨物居方水就濕火就燥坎離不交未濟之象水火二物南北二方其位已定何待於辨中爻互體又復水火闕坎離易位闕初六濡其尾吝象曰濡其尾亦不知極也闕九二曵其輪貞吉象曰九二貞吉中以行正也二以剛居互離之下輪也用之而柔曵其輪也失五之應其何以行貞吉者但守其剛闕中不失其正所以吉也六三未濟征凶利渉大川象曰未濟征凶位不當也卦自否來六三曰包羞而此爻以征凶言者盖以柔居陽位本不當復變而為未濟處二坎之中上負四下乗二前後皆險安得不凶若用而剛於卦為鼎重險皆平則為渉川之利矣九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也四居不當位而云貞吉悔亡者何也卦本否二之柔行而居五四之志在乎君不宜變也變則為困闕之吝闕六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也卦本否易為未濟五不當位而言貞吉无悔者時當未濟五之君但宜守柔二四上闕臣闕剛輔之陽為君子君子之光指三剛爻闕交孚安得不吉上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也坎為酒指二也四互坎亦酒也五資二四之剛飲酒者也上應乎五孚于飲酒者也何咎之有若用而柔變竒為耦濡其首也本與五孚變闕失是剛柔相濟是為有節苟不與五孚闕不知節矣易通卷六
